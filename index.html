<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ОГЭ Информатика - Решебник</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; overflow: hidden; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="screen-home" class="absolute inset-0 transition-transform duration-500 ease-in-out translate-x-0 overflow-y-auto p-5 pb-24">
    <header class="mb-6 pt-4">
      <h1 class="text-3xl font-extrabold flex items-center gap-2">
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">ОГЭ Инфо</span>
        <i data-lucide="sparkles" class="text-purple-400"></i>
      </h1>
      <p class="text-slate-400 mt-2">15 интерактивных тренажеров</p>
      
      <div class="mt-4 flex items-center justify-between bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-yellow-500/20 rounded-xl text-yellow-400"><i data-lucide="trophy"></i></div>
          <div>
            <div class="text-sm text-slate-400">Прогресс</div>
            <div class="font-bold text-lg"><span id="progress-count">0</span> / 15 решено</div>
          </div>
        </div>
        <div class="text-2xl font-black text-blue-400"><span id="progress-percent">0</span>%</div>
      </div>
    </header>

    <div id="tasks-list" class="space-y-4"></div>
  </div>

  <div id="screen-task" class="absolute inset-0 bg-slate-900 transition-transform duration-500 ease-in-out translate-x-full z-10 flex flex-col">
    <header class="flex items-center justify-between p-4 pt-6 bg-slate-800/50 border-b border-slate-700/50 backdrop-blur-md z-20">
      <button onclick="closeTask()" class="p-2 -ml-2 text-slate-400 hover:text-white rounded-full"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
      <h2 id="task-title" class="font-bold text-lg">Задание</h2>
      <div class="w-10"></div>
    </header>
    <div id="task-content" class="flex-1 overflow-y-auto p-5 pb-24"></div>
  </div>

  <button onclick="toggleChat(true)" class="fixed bottom-6 right-6 p-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-full text-white shadow-lg z-30 flex items-center justify-center animate-bounce">
    <i data-lucide="message-square"></i>
  </button>

  <div id="chat-modal" class="hidden fixed inset-0 bg-slate-900/95 z-50 flex flex-col">
    <header class="flex items-center justify-between p-4 bg-slate-800 border-b border-slate-700">
      <div class="flex items-center gap-2 text-purple-400 font-bold"><i data-lucide="bot"></i> AI-Наставник</div>
      <button onclick="toggleChat(false)" class="p-2 text-slate-400"><i data-lucide="x"></i></button>
    </header>
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
      <div class="flex justify-start"><div class="max-w-[85%] p-3 rounded-2xl text-sm bg-slate-700 text-slate-200 rounded-bl-none">Привет! Я ИИ-наставник. Спрашивай, я помогу с решением или объясню теорию!</div></div>
    </div>
    <div class="p-4 bg-slate-800 flex gap-2">
      <input type="text" id="chat-input" placeholder="Твой вопрос..." class="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 outline-none text-white text-sm" onkeypress="if(event.key === 'Enter') sendChatMessage()">
      <button onclick="sendChatMessage()" class="bg-purple-600 p-3 rounded-xl text-white"><i data-lucide="send"></i></button>
    </div>
  </div>

  <script>
    // ==========================================
    // 🔑 СЮДА НУЖНО ВСТАВИТЬ API КЛЮЧ GEMINI
    // ==========================================
    const API_KEY = "AIzaSyBP61BrfwIGrWOCmIQHnnmsOpBjWuPU6mo"; 

    // Данные задач
    const TASKS = [
      { id: 1, title: 'Задание 1', desc: 'Объем информации', icon: 'calculator', color: 'from-gray-600 to-slate-700' },
      { id: 2, title: 'Задание 2', desc: 'Кодирование (Шифровка)', icon: 'book-open', color: 'from-emerald-500 to-green-600' },
      { id: 3, title: 'Задание 3', desc: 'Логика (И, ИЛИ, НЕ)', icon: 'brain-circuit', color: 'from-pink-500 to-rose-500' },
      { id: 4, title: 'Задание 4', desc: 'Графы (Поиск пути)', icon: 'network', color: 'from-blue-500 to-cyan-500' },
      { id: 5, title: 'Задание 5', desc: 'Исполнители (Калькулятор)', icon: 'route', color: 'from-amber-500 to-orange-500' },
      { id: 6, title: 'Задание 6', desc: 'Программы с условиями', icon: 'file-text', color: 'from-violet-500 to-purple-600' },
      { id: 7, title: 'Задание 7', desc: 'Сборка URL адреса', icon: 'link', color: 'from-sky-500 to-blue-600' },
      { id: 8, title: 'Задание 8', desc: 'Множества (Поисковик)', icon: 'pie-chart', color: 'from-fuchsia-500 to-pink-600' },
      { id: 9, title: 'Задание 9', desc: 'Количество путей', icon: 'network', color: 'from-teal-500 to-emerald-600' },
      { id: 10, title: 'Задание 10', desc: 'Системы счисления', icon: 'binary', color: 'from-purple-500 to-indigo-500' },
      { id: 11, title: 'Задание 11', desc: 'Поиск в тексте', icon: 'search', color: 'from-zinc-500 to-stone-600' },
      { id: 12, title: 'Задание 12', desc: 'Файловые маски', icon: 'folder-search', color: 'from-yellow-500 to-amber-600' },
      { id: 13, title: 'Задание 13', desc: 'Форматирование текста', icon: 'type', color: 'from-red-500 to-rose-600' },
      { id: 14, title: 'Задание 14', desc: 'Электронные таблицы', icon: 'file-spreadsheet', color: 'from-green-500 to-emerald-600' },
      { id: 15, title: 'Задание 15', desc: 'Программирование (Робот)', icon: 'bot', color: 'from-blue-600 to-indigo-700' }
    ];

    let progress = {};

    // Инициализация TG
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.expand();
      const tgBg = window.Telegram.WebApp.backgroundColor;
      if (tgBg) document.body.style.backgroundColor = tgBg;
    }

    // Рендер списка на главном экране
    function renderHome() {
      const list = document.getElementById('tasks-list');
      list.innerHTML = TASKS.map(task => `
        <button onclick="openTask(${task.id})" class="w-full text-left p-4 rounded-3xl transition-transform active:scale-[0.98] relative overflow-hidden group border bg-slate-800/80 border-slate-700">
          <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b ${task.color}"></div>
          <div class="flex items-center justify-between ml-2">
            <div class="flex items-center gap-4">
              <div class="p-3 rounded-2xl bg-gradient-to-br ${task.color} bg-opacity-10 text-white"><i data-lucide="${task.icon}"></i></div>
              <div>
                <h3 class="font-bold text-lg flex items-center gap-2">${task.title} ${progress[task.id] ? '<i data-lucide="check-circle" class="text-green-400 w-4 h-4"></i>' : ''}</h3>
                <p class="text-slate-400 text-sm">${task.desc}</p>
              </div>
            </div>
            <i data-lucide="arrow-right" class="text-slate-500"></i>
          </div>
        </button>
      `).join('');
      lucide.createIcons();
      updateProgress();
    }

    function updateProgress() {
      const solved = Object.values(progress).filter(Boolean).length;
      document.getElementById('progress-count').innerText = solved;
      document.getElementById('progress-percent').innerText = Math.round((solved / 15) * 100);
    }

    function markCompleted(id) {
      if(progress[id]) return;
      progress[id] = true;
      document.getElementById('task-content').innerHTML += `
        <div class="p-4 mt-4 bg-green-500/10 border border-green-500/30 rounded-2xl text-green-400 flex gap-3 animate-fade-in">
          <i data-lucide="check-circle" class="shrink-0 mt-0.5"></i><div><p class="font-bold">Идеально! Задание решено.</p></div>
        </div>
      `;
      lucide.createIcons();
      document.getElementById('task-content').scrollTop = 9999;
    }

    function openTask(id) {
      const task = TASKS.find(t => t.id === id);
      document.getElementById('task-title').innerText = task.title;
      document.getElementById('task-content').innerHTML = renderers[id].html();
      if (renderers[id].setup) renderers[id].setup();
      
      document.getElementById('screen-home').classList.replace('translate-x-0', '-translate-x-full');
      document.getElementById('screen-task').classList.replace('translate-x-full', 'translate-x-0');
      lucide.createIcons();
    }

    function closeTask() {
      document.getElementById('screen-home').classList.replace('-translate-x-full', 'translate-x-0');
      document.getElementById('screen-task').classList.replace('translate-x-0', 'translate-x-full');
      setTimeout(renderHome, 300);
    }

    // --- AI ЧАТ ---
    function toggleChat(show) {
      document.getElementById('chat-modal').classList.toggle('hidden', !show);
    }

    async function sendChatMessage() {
      const inputEl = document.getElementById('chat-input');
      const text = inputEl.value.trim();
      if (!text) return;
      
      inputEl.value = '';
      const messagesDiv = document.getElementById('chat-messages');
      
      // Сообщение пользователя
      messagesDiv.innerHTML += `<div class="flex justify-end mt-2"><div class="max-w-[85%] p-3 rounded-2xl text-sm bg-blue-600 text-white rounded-br-none">${text}</div></div>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      if (!API_KEY) {
        setTimeout(() => {
          messagesDiv.innerHTML += `<div class="flex justify-start mt-2"><div class="max-w-[85%] p-3 rounded-2xl text-sm bg-slate-700 text-slate-200 rounded-bl-none">❌ API ключ не настроен. Найди в коде константу API_KEY и вставь туда свой ключ от Google AI Studio.</div></div>`;
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, 500);
        return;
      }

      // Отправка в Gemini API
      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: "Ты ИИ-репетитор по информатике (ОГЭ). Отвечай кратко, понятно." }] },
            contents: [{ parts: [{ text: text }] }]
          })
        });
        const data = await response.json();
        const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Ошибка.';
        messagesDiv.innerHTML += `<div class="flex justify-start mt-2"><div class="max-w-[85%] p-3 rounded-2xl text-sm bg-slate-700 text-slate-200 rounded-bl-none">${aiText}</div></div>`;
      } catch (err) {
        messagesDiv.innerHTML += `<div class="flex justify-start mt-2"><div class="max-w-[85%] p-3 rounded-2xl text-sm bg-slate-700 text-red-400 rounded-bl-none">Ошибка сети.</div></div>`;
      }
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // --- ПЕСОЧНИЦЫ (ЗАДАНИЯ 1-15) ---
    const renderers = {
      1: {
        html: () => `
          <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 space-y-4">
            <h3 class="font-bold text-gray-400 mb-2">Объем текста</h3>
            <p class="text-sm text-slate-300">Настрой ползунки, чтобы объем составил ровно <b>80 байт</b>.</p>
            <label class="block text-xs text-slate-400 mt-4">Символы: <span id="t1-chars-v">40</span></label>
            <input type="range" id="t1-chars" min="10" max="100" step="10" value="40" class="w-full">
            <select id="t1-bits" class="w-full bg-slate-900 p-3 rounded border border-slate-700 outline-none text-white mt-2">
              <option value="8">8 бит (1 байт)</option>
              <option value="16" selected>16 бит (2 байта)</option>
            </select>
            <div class="text-center p-4 bg-slate-900 rounded-xl border border-slate-700">Итог: <span id="t1-res" class="text-2xl font-bold text-gray-400">80</span> байт</div>
          </div>
        `,
        setup: () => {
          const update = () => {
            const c = +document.getElementById('t1-chars').value;
            const b = +document.getElementById('t1-bits').value;
            const res = (c * b) / 8;
            document.getElementById('t1-chars-v').innerText = c;
            document.getElementById('t1-res').innerText = res;
            if (res === 80) markCompleted(1);
          };
          document.getElementById('t1-chars').oninput = update;
          document.getElementById('t1-bits').onchange = update;
          update();
        }
      },
      3: {
        html: () => `
          <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 space-y-4">
            <h3 class="font-bold text-pink-400 mb-2">Логика: (X > 16) И НЕ (X нечётное)</h3>
            <p class="text-sm text-slate-300">Найди X, чтобы выражение стало <b>ИСТИНА</b>.</p>
            <div class="flex items-center gap-4 mt-4">
              <input type="range" id="t3-x" min="10" max="25" value="10" class="w-full accent-pink-500">
              <div id="t3-val" class="text-2xl font-mono font-bold w-12 text-center bg-slate-900 p-2 rounded-xl text-white">10</div>
            </div>
            <div id="t3-res" class="p-4 rounded-xl font-bold text-center bg-slate-900 text-slate-500 border border-slate-700">ЛОЖЬ</div>
          </div>
        `,
        setup: () => {
          document.getElementById('t3-x').oninput = (e) => {
            const val = +e.target.value;
            document.getElementById('t3-val').innerText = val;
            const isTrue = (val > 16) && (val % 2 === 0);
            const resEl = document.getElementById('t3-res');
            resEl.innerText = isTrue ? 'ИСТИНА' : 'ЛОЖЬ';
            resEl.className = `p-4 rounded-xl font-bold text-center transition-colors ${isTrue ? 'bg-green-500 text-white' : 'bg-slate-900 text-slate-500 border border-slate-700'}`;
            if(isTrue) markCompleted(3);
          };
        }
      },
      11: {
        html: () => `
          <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 space-y-4">
            <h3 class="font-bold text-zinc-400 mb-2">Поиск (Ctrl+F)</h3>
            <p class="text-sm text-slate-300">Введи слово "Онегин", чтобы подсветить его в тексте.</p>
            <input type="text" id="t11-in" placeholder="Искать..." class="w-full bg-slate-900 border border-slate-700 p-3 rounded outline-none focus:border-zinc-500 text-white mt-2">
            <div id="t11-txt" class="bg-slate-900 p-4 rounded text-slate-400">Онегин любил гулять. Онегин был одет.</div>
            <div class="text-zinc-400">Совпадений: <span id="t11-count" class="font-bold">0</span></div>
          </div>
        `,
        setup: () => {
          const txt = "Онегин любил гулять. Онегин был одет.";
          document.getElementById('t11-in').oninput = (e) => {
            const q = e.target.value.toLowerCase();
            const matches = q ? (txt.toLowerCase().match(new RegExp(q, 'g')) || []).length : 0;
            document.getElementById('t11-count').innerText = matches;
            
            if (!q) { document.getElementById('t11-txt').innerHTML = txt; return; }
            const parts = txt.split(new RegExp(`(${q})`, 'gi'));
            document.getElementById('t11-txt').innerHTML = parts.map(p => p.toLowerCase()===q ? `<mark class="bg-yellow-500/50 text-white px-1 rounded">${p}</mark>` : p).join('');
            if(matches === 2) markCompleted(11);
          };
        }
      },
      12: {
        html: () => `
          <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 space-y-4">
            <h3 class="font-bold text-yellow-400 mb-2">Файловые маски</h3>
            <p class="text-sm text-slate-300">Напиши маску (например, <code>*.txt</code>), чтобы оставить только 2 файла txt.</p>
            <input type="text" id="t12-in" class="w-full bg-slate-900 border border-slate-700 p-3 rounded text-white outline-none focus:border-yellow-500 font-mono mt-2" placeholder="Маска...">
            <div id="t12-files" class="bg-slate-900 p-3 rounded font-mono text-sm space-y-2 text-slate-500">
              <div id="f1">document.txt</div><div id="f2">image.jpg</div><div id="f3">report.txt</div>
            </div>
          </div>
        `,
        setup: () => {
          const fList = ['document.txt', 'image.jpg', 'report.txt'];
          document.getElementById('t12-in').oninput = (e) => {
            const m = e.target.value;
            let regex;
            try { regex = new RegExp(`^${m.replace(/\./g,'\\.').replace(/\*/g,'.*').replace(/\?/g,'.')}$`, 'i'); } catch(e){}
            let matchedCount = 0;
            fList.forEach((f, i) => {
              const el = document.getElementById(`f${i+1}`);
              if (m && regex && regex.test(f)) { el.className = "text-yellow-400 bg-yellow-400/10 p-1 rounded"; matchedCount++; }
              else { el.className = "p-1"; }
            });
            if (matchedCount === 2 && m.includes('*')) markCompleted(12);
          };
        }
      },
      15: {
        html: () => `
          <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 space-y-4">
            <h3 class="font-bold text-blue-400 mb-2">Робот (3x3)</h3>
            <p class="text-sm text-slate-300">Напиши команды (вправо, вниз), чтобы робот 🤖 доехал в правый нижний угол.</p>
            <div class="flex gap-4 mt-4">
              <textarea id="t15-code" class="w-1/2 h-32 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm font-mono text-white outline-none focus:border-blue-500" placeholder="вправо\nвниз"></textarea>
              <div class="w-1/2 grid grid-cols-3 gap-1" id="t15-grid"></div>
            </div>
            <button onclick="window.runRobot()" class="w-full mt-2 bg-blue-600 py-3 rounded-xl font-bold text-white shadow-lg active:scale-95 transition-transform"><i data-lucide="play" class="inline w-4 h-4 mr-2"></i>Запуск</button>
          </div>
        `,
        setup: () => {
          window.runRobot = () => {
            const code = document.getElementById('t15-code').value.toLowerCase().split('\n');
            let x=0, y=0;
            code.forEach(c => {
              if(c.trim()==='вправо' && x<2) x++;
              if(c.trim()==='вниз' && y<2) y++;
            });
            drawGrid(x,y);
            if(x===2 && y===2) markCompleted(15);
          };
          const drawGrid = (rx,ry) => {
            let html = '';
            for(let y=0; y<3; y++){
              for(let x=0; x<3; x++){
                const isR = (x===rx && y===ry);
                html += `<div class="aspect-square border border-slate-700 flex items-center justify-center rounded ${isR ? 'bg-blue-600' : 'bg-slate-800'}">${isR ? '🤖' : ''}</div>`;
              }
            }
            document.getElementById('t15-grid').innerHTML = html;
          };
          drawGrid(0,0);
        }
      }
    };

    // Заглушки для остальных
    [2,4,5,6,7,8,9,10,13,14].forEach(id => {
      if(!renderers[id]) renderers[id] = {
        html: () => `
          <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 text-center flex flex-col items-center">
            <div class="p-4 bg-slate-700 rounded-full mb-4 text-slate-300"><i data-lucide="info" class="w-8 h-8"></i></div>
            <h3 class="font-bold text-xl text-white mb-2">Задание ${id}</h3>
            <p class="text-slate-400 mb-6">Эта песочница работает аналогично показанным ранее.</p>
            <button onclick="markCompleted(${id})" class="bg-blue-600 px-6 py-3 rounded-xl font-bold text-white shadow-lg active:scale-95">Смоделировать решение</button>
          </div>
        `
      };
    });

    renderHome();
  </script>
</body>
</html>
