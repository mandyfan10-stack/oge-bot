<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OGE Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.error('JS Error:', msg, 'at', url, ':', line, ':', col);
        var errDiv = document.createElement('div');
        errDiv.style.padding = '20px';
        errDiv.style.color = 'red';
        var errTitle = document.createElement('h1');
        errTitle.textContent = 'Runtime Error';
        var errMsg = document.createElement('pre');
        errMsg.textContent = 'An unexpected error occurred. Please try again later.';
        errDiv.appendChild(errTitle);
        errDiv.appendChild(errMsg);
        document.body.innerHTML = '';
        document.body.appendChild(errDiv);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
