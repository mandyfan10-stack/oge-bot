<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ОГЭ Информатика - Решебник</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    
    body { 
      background-color: #09090b; 
      color: #fafafa; 
      font-family: 'Inter', sans-serif; 
      overflow: hidden; 
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }
    
    /* Оптимизация скролла для мобильных */
    .overflow-y-auto {
      -webkit-overflow-scrolling: touch;
      will-change: scroll-position;
    }

    /* Защита от авто-зума на iOS при фокусе */
    input[type="number"], input[type="text"], textarea, select { 
      font-size: 16px !important; 
    }
    
    /* Анимации */
    .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .animate-pop { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .animate-shake { animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
    .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    .animate-message { animation: messagePop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards; transform-origin: bottom left; }
    .animate-message-user { animation: messagePop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards; transform-origin: bottom right; }
    .animate-spin-slow { animation: spin 3s linear infinite; }

    @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    @keyframes messagePop { 0% { opacity: 0; transform: scale(0.9) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Премиум компоненты с аппаратным ускорением для мобилок */
    .glass-panel { 
      background: rgba(24, 24, 27, 0.65); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
      border: 1px solid rgba(255, 255, 255, 0.05); 
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); 
      transform: translateZ(0); /* Включает GPU рендеринг, убирая лаги */
    }
    .glass-button { background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s ease; }
    
    @media (hover: hover) {
      .glass-button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
    }
    .glass-button:active { transform: translateY(1px) scale(0.98); }

    #chat-modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
    #chat-modal.hidden-chat { opacity: 0; visibility: hidden; pointer-events: none; }
    #chat-container { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; }
    #chat-modal.hidden-chat #chat-container { transform: translateY(100%); }
  </style>
</head>
<body>
  <!-- Окружающее свечение -->
  <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-600/10 blur-[100px]" style="transform: translateZ(0);"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-blue-600/10 blur-[120px]" style="transform: translateZ(0);"></div>
  </div>

  <!-- ЭКРАН 1: КУРСЫ (МОДУЛИ) -->
  <div id="screen-courses" class="absolute inset-0 transition-transform duration-500 ease-in-out translate-x-0 overflow-y-auto p-5 pb-24 z-10">
    <header class="mb-8 pt-4 animate-slide-up">
      <h1 class="text-3xl font-bold tracking-tight flex items-center gap-3">
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 to-purple-400">ОГЭ Инфо</span>
        <i data-lucide="sparkles" class="text-purple-400 w-6 h-6 animate-pulse"></i>
      </h1>
      <p class="text-zinc-400 font-light mt-2 text-sm">Образовательные модули</p>
      
      <div class="mt-6 glass-panel p-5 rounded-[2rem] flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="p-3 bg-indigo-500/20 rounded-2xl text-indigo-300"><i data-lucide="award"></i></div>
          <div>
            <div class="text-xs text-zinc-400 uppercase tracking-wider font-semibold mb-1">Всего решено</div>
            <div class="font-medium text-lg"><span id="global-progress">0</span> <span class="text-zinc-500">/ 20</span></div>
          </div>
        </div>
      </div>
    </header>
    <div id="courses-list" class="space-y-5"></div>
  </div>

  <!-- ЭКРАН 2: СПИСОК ЗАДАЧ КУРСА -->
  <div id="screen-tasks" class="absolute inset-0 bg-[#09090b] transition-transform duration-500 ease-in-out translate-x-full overflow-y-auto z-20">
    <header class="flex items-center gap-4 sticky top-0 bg-[#09090b]/95 backdrop-blur-md z-10 px-5 py-4 border-b border-white/5 shadow-sm">
      <button onclick="closeCourse()" aria-label="Вернуться к списку курсов" title="Вернуться к списку курсов" class="shrink-0 p-2.5 glass-button rounded-xl text-zinc-400 hover:text-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
      </button>
      <div class="min-w-0 flex-1">
        <h2 id="course-title" class="font-medium text-lg text-zinc-100 truncate">Название курса</h2>
        <p id="course-desc" class="text-xs text-zinc-500 font-light truncate mt-0.5"></p>
      </div>
    </header>
    <div id="tasks-list" class="space-y-4 p-5 pb-24"></div>
  </div>

  <!-- ЭКРАН 3: ПЕСОЧНИЦА ЗАДАЧИ -->
  <div id="screen-task" class="absolute inset-0 bg-[#09090b] transition-transform duration-500 ease-in-out translate-x-full flex flex-col z-30">
    <header class="flex items-center justify-between sticky top-0 bg-[#09090b]/95 backdrop-blur-md z-10 px-5 py-4 border-b border-white/5 shadow-sm shrink-0">
      <div class="flex items-center gap-4 min-w-0">
        <button onclick="closeTask()" aria-label="Вернуться к списку заданий" title="Вернуться к списку заданий" class="shrink-0 p-2.5 glass-button rounded-xl text-zinc-400 hover:text-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h2 id="task-title" class="font-medium text-lg tracking-wide text-zinc-100 truncate">Задание</h2>
      </div>
      <button id="btn-regenerate" onclick="regenerateTask()" aria-label="Сгенерировать новые условия" title="Сгенерировать новые условия" class="shrink-0 p-2.5 glass-button text-indigo-400 hover:text-indigo-300 transition-colors rounded-xl ml-3 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
      </button>
    </header>
    <div id="task-content" class="flex-1 overflow-y-auto p-5 pb-24 relative"></div>
  </div>

  <!-- КНОПКА AI -->
  <button id="chat-trigger-btn" onclick="toggleChat(true)" aria-label="Открыть ИИ-наставника" title="Открыть ИИ-наставника" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full text-white shadow-[0_8px_20px_rgba(99,102,241,0.3)] z-40 flex items-center justify-center transition-transform hover:scale-105 active:scale-95 group focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-offset-[#09090b] focus-visible:ring-indigo-500">
    <i data-lucide="bot" class="w-6 h-6 group-hover:animate-bounce"></i>
  </button>

  <!-- МОДАЛКА AI -->
  <div id="chat-modal" class="hidden-chat fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex flex-col justify-end" style="transform: translateZ(0);">
    <div class="absolute inset-0" onclick="toggleChat(false)"></div>
    <div id="chat-container" class="bg-[#09090b] border-t border-white/10 rounded-t-[2rem] w-full max-h-[85vh] flex flex-col relative z-10 shadow-2xl">
      <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mt-3 mb-2"></div>
      <header class="flex items-center justify-between p-4 px-6 border-b border-white/5">
        <div class="flex items-center gap-3 text-indigo-300 font-medium"><div class="p-2 bg-indigo-500/20 rounded-xl"><i data-lucide="sparkles" class="w-5 h-5"></i></div> ИИ-Наставник</div>
        <button onclick="toggleChat(false)" aria-label="Закрыть чат" title="Закрыть чат" class="p-2 text-zinc-500 hover:text-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 rounded"><i data-lucide="x" class="w-5 h-5"></i></button>
      </header>
      <div id="chat-messages" class="flex-1 overflow-y-auto p-5 space-y-5 scroll-smooth">
        <div class="flex justify-start animate-message"><div class="max-w-[90%] p-4 rounded-2xl rounded-tl-none text-sm bg-white/5 border border-white/10 text-zinc-200 font-light leading-relaxed">Привет! Я ИИ-репетитор. Спрашивай любую задачу, если застрял! ✨</div></div>
      </div>
      <div class="p-4 px-5 glass-panel border-t-0">
        <div class="flex gap-2 bg-black/40 border border-white/10 p-1.5 rounded-2xl focus-within:ring-2 focus-within:ring-indigo-500">
          <input type="text" id="chat-input" aria-label="Сообщение для ИИ" placeholder="Задай вопрос..." maxlength="250" class="flex-1 bg-transparent px-4 py-2 outline-none text-white text-base font-light" onkeypress="if(event.key === 'Enter') sendChatMessage()">
          <button onclick="sendChatMessage()" aria-label="Отправить сообщение" title="Отправить сообщение" class="bg-indigo-600 p-3 rounded-xl text-white hover:bg-indigo-500 active:scale-95 transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-300"><i data-lucide="send" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- УТИЛИТЫ ---
    function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function getRandomElement(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffleArray(arr) { return [...arr].sort(() => Math.random() - 0.5); }
    function getRandomBool() { return Math.random() > 0.5; }
    function renderLucideIcons(root = document) {
      if (!window.lucide || !root || !root.querySelector('i[data-lucide]')) return;
      lucide.createIcons({ root });
    }


    const BACKEND_URL = "https://oge-backend.onrender.com/api/chat";
    const TOTAL_TASKS = 20;

    // --- СТРУКТУРА КУРСОВ ---
    const COURSES = [
      {
        id: 'c1', title: 'Тренажер ОГЭ (Задания 1-15)', desc: 'Полный набор всех интерактивных заданий из ОГЭ.', 
        icon: 'layout-list', color: 'from-blue-500 to-indigo-600', delay: 0.1,
        tasks: [
          { id: 1, title: 'Задание 1', desc: 'Объем информации', icon: 'file-digit' },
          { id: 2, title: 'Задание 2', desc: 'Декодирование', icon: 'key' },
          { id: 3, title: 'Задание 3', desc: 'Логические выражения', icon: 'git-merge' },
          { id: 4, title: 'Задание 4', desc: 'Графы и маршруты', icon: 'route' },
          { id: 5, title: 'Задание 5', desc: 'Анализ алгоритма', icon: 'cpu' },
          { id: 6, title: 'Задание 6', desc: 'Программы Python', icon: 'terminal' },
          { id: 7, title: 'Задание 7', desc: 'Адресация URL', icon: 'globe' },
          { id: 8, title: 'Задание 8', desc: 'Множества в поиске', icon: 'layers' },
          { id: 9, title: 'Задание 9', desc: 'Количество путей', icon: 'git-branch' },
          { id: 10, title: 'Задание 10', desc: 'Системы счисления', icon: 'binary' },
          { id: 11, title: 'Задание 11', desc: 'Поиск в тексте', icon: 'search' },
          { id: 12, title: 'Задание 12', desc: 'Маски файлов', icon: 'folder-search' },
          { id: 13, title: 'Задание 13', desc: 'Форматирование', icon: 'type' },
          { id: 14, title: 'Задание 14', desc: 'Электронные таблицы', icon: 'table-2' },
          { id: 15, title: 'Задание 15', desc: 'Робот (Алгоритмы)', icon: 'bot' }
        ]
      },
      {
        id: 'c2', title: 'Основы Python', desc: 'Дополнительный курс: циклы, списки и функции.', 
        icon: 'terminal-square', color: 'from-emerald-400 to-teal-600', delay: 0.2,
        tasks: [
          { id: 16, title: 'Цикл FOR', desc: 'Предсказание вывода программы', icon: 'repeat' },
          { id: 17, title: 'Списки (Массивы)', desc: 'Индексация элементов', icon: 'list' },
          { id: 18, title: 'Функции', desc: 'Аргументы и возврат', icon: 'function-square' }
        ]
      },
      {
        id: 'c3', title: 'Компьютерные сети и ПК', desc: 'Основы железа, IP адреса и маски подсети.', 
        icon: 'server', color: 'from-sky-400 to-blue-600', delay: 0.3,
        tasks: [
          { id: 19, title: 'IP-адресация', desc: 'Сборка валидного IP-адреса', icon: 'network' },
          { id: 20, title: 'Устройство ПК', desc: 'Функции комплектующих', icon: 'cpu' }
        ]
      }
    ];

    let progress = {};
    let currentCourseId = null;
    let currentTaskId = null;
    let taskCloseCleanupTimer = null;
    window.taskState = {}; 

    if (window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.expand(); }

    function renderCourses() {
      const list = document.getElementById('courses-list');
      list.innerHTML = COURSES.map(c => {
        const solvedInCourse = c.tasks.filter(t => progress[t.id]).length;
        const total = c.tasks.length;
        return `
        <button onclick="openCourse('${c.id}')" class="w-full text-left p-5 glass-panel rounded-[2rem] relative group animate-slide-up focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 focus-visible:ring-offset-[#09090b]" style="animation-delay: ${c.delay}s;">
          <div class="absolute inset-0 bg-gradient-to-r ${c.color} opacity-0 group-hover:opacity-10 transition-opacity duration-300 rounded-[2rem]"></div>
          <div class="flex items-start gap-4 relative z-10">
            <div class="p-4 rounded-[1.25rem] bg-gradient-to-br ${c.color} bg-opacity-20 text-white shadow-lg">
              <i data-lucide="${c.icon}" class="w-6 h-6"></i>
            </div>
            <div class="flex-1">
              <h3 class="font-medium text-lg text-zinc-100">${c.title}</h3>
              <p class="text-zinc-500 font-light text-sm mt-1 mb-3">${c.desc}</p>
              <div class="flex items-center gap-2">
                <div class="flex-1 h-1.5 bg-black/40 rounded-full overflow-hidden border border-white/5">
                  <div id="course-progress-bar-${c.id}" class="h-full bg-gradient-to-r ${c.color} rounded-full transition-all duration-500" style="width: ${(solvedInCourse/total)*100}%"></div>
                </div>
                <span id="course-progress-text-${c.id}" class="text-xs font-mono text-zinc-400">${solvedInCourse}/${total}</span>
              </div>
            </div>
          </div>
        </button>
      `;
      }).join('');
      renderLucideIcons(list); // Локальный вызов для оптимизации
      updateGlobalProgress();
    }

    function openCourse(id) {
      currentCourseId = id;
      const course = COURSES.find(c => c.id === id);
      document.getElementById('course-title').innerText = course.title;
      document.getElementById('course-desc').innerText = course.desc;
      renderTasks(course);
      document.getElementById('screen-courses').classList.replace('translate-x-0', '-translate-x-full');
      document.getElementById('screen-tasks').classList.replace('translate-x-full', 'translate-x-0');
    }

    function closeCourse() {
      currentCourseId = null;

      document.getElementById('screen-courses').classList.replace('-translate-x-full', 'translate-x-0');
      document.getElementById('screen-tasks').classList.replace('translate-x-0', 'translate-x-full');
    }

    const taskDOMCache = {};

    function renderTasks(course) {
      const list = document.getElementById('tasks-list');

      if (taskDOMCache[course.id] && taskDOMCache[course.id].count !== course.tasks.length) {
        delete taskDOMCache[course.id];
      }

      if (taskDOMCache[course.id]) {
        list.replaceChildren(...taskDOMCache[course.id].nodes);
        course.tasks.forEach(task => {
          const icon = document.getElementById(`check-icon-${task.id}`);
          if (icon) {
            if (progress[task.id]) icon.classList.remove('hidden');
            else icon.classList.add('hidden');
          }
        });
        return;
      }

      list.innerHTML = course.tasks.map((task, idx) => `
        <button onclick="openTask(${task.id})" class="w-full text-left p-4 glass-panel rounded-[1.5rem] flex items-center justify-between group animate-slide-up focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 focus-visible:ring-offset-[#09090b]" style="animation-delay: ${idx * 0.05}s;">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-zinc-400 group-hover:text-white transition-colors">
              <i data-lucide="${task.icon}" class="w-5 h-5"></i>
            </div>
            <div>
              <h4 class="font-medium text-zinc-200 flex items-center gap-2">
                ${task.title}
                <i id="check-icon-${task.id}" data-lucide="check-circle-2" class="text-emerald-400 w-4 h-4 ${progress[task.id] ? '' : 'hidden'}"></i>
              </h4>
              <p class="text-xs text-zinc-500 font-light mt-0.5">${task.desc}</p>
            </div>
          </div>
          <i data-lucide="chevron-right" class="text-zinc-600 group-hover:text-zinc-300 transition-colors"></i>
        </button>
      `).join('');
      renderLucideIcons(list);
      taskDOMCache[course.id] = {
        count: course.tasks.length,
        nodes: Array.from(list.childNodes)
      };
    }

    function applyTaskUXEnhancements(taskId) {
      const content = document.getElementById('task-content');
      if (!content) return;

      const inputs = content.querySelectorAll('input');
      inputs.forEach(input => {
        if (!input.getAttribute('aria-label') && input.getAttribute('placeholder')) {
          input.setAttribute('aria-label', input.getAttribute('placeholder'));
        }

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const submitBtn = content.querySelector(`button[onclick*="window.check_t${taskId}"]`);
            if (submitBtn) {
              submitBtn.click();
            }
          }
        });
      });

      const buttons = content.querySelectorAll('button:not([class*="focus-visible:ring-"])');
      buttons.forEach(button => {
        button.classList.add('focus-visible:outline-none', 'focus-visible:ring-2', 'focus-visible:ring-indigo-500');
      });
    }

    function regenerateTask() {
      if (!currentTaskId) return;
      if (taskCloseCleanupTimer) {
        clearTimeout(taskCloseCleanupTimer);
        taskCloseCleanupTimer = null;
      }
      const id = currentTaskId;
      const btn = document.getElementById('btn-regenerate');
      if (btn) {
        const icn = btn.querySelector('svg') || btn.querySelector('i');
        if (icn) {
          icn.classList.add('animate-spin-slow');
          setTimeout(() => icn.classList.remove('animate-spin-slow'), 500);
        }
      }
      if (renderers[id].init) renderers[id].init(id);
      const content = document.getElementById('task-content');
      content.innerHTML = renderers[id].html(id) + `<div id="feedback-${id}" aria-live="polite" class="hidden mt-6 p-4 rounded-2xl border flex items-center text-sm font-medium transition-all duration-300"><div id="feedback-icon-${id}"></div><div id="feedback-msg-${id}"></div></div>`;
      if (renderers[id].setup) renderers[id].setup(id);
      applyTaskUXEnhancements(id);
      renderLucideIcons(content);
      renderLucideIcons(document.getElementById('screen-task'));
    }

    function openTask(id) {
      if (taskCloseCleanupTimer) {
        clearTimeout(taskCloseCleanupTimer);
        taskCloseCleanupTimer = null;
      }
      currentTaskId = id;
      const course = COURSES.find(c => c.id === currentCourseId);
      const taskInfo = course.tasks.find(t => t.id === id);
      document.getElementById('task-title').innerText = taskInfo.title;
      
      if (renderers[id].init) renderers[id].init(id);
      const content = document.getElementById('task-content');
      content.innerHTML = renderers[id].html(id) + `<div id="feedback-${id}" aria-live="polite" class="hidden mt-6 p-4 rounded-2xl border flex items-center text-sm font-medium transition-all duration-300"><div id="feedback-icon-${id}"></div><div id="feedback-msg-${id}"></div></div>`;
      if (renderers[id].setup) renderers[id].setup(id);
      applyTaskUXEnhancements(id);
      
      document.getElementById('screen-tasks').classList.replace('translate-x-0', '-translate-x-full');
      document.getElementById('screen-task').classList.replace('translate-x-full', 'translate-x-0');
      renderLucideIcons(content);
      renderLucideIcons(document.getElementById('screen-task'));
    }

    function closeTask() {
      currentTaskId = null;
      document.getElementById('screen-tasks').classList.replace('-translate-x-full', 'translate-x-0');
      document.getElementById('screen-task').classList.replace('translate-x-0', 'translate-x-full');
      

      taskCloseCleanupTimer = setTimeout(() => {
        const taskScreen = document.getElementById('screen-task');
        if (currentTaskId === null && taskScreen.classList.contains('translate-x-full')) {

    function updateGlobalProgress() {
      const solved = Object.values(progress).filter(Boolean).length;
      document.getElementById('global-progress').innerText = solved;
    }

    function showFeedback(taskId, isCorrect, msg) {
      const fb = document.getElementById(`feedback-${taskId}`);
      if (!fb) return;
      fb.className = 'mt-6 p-4 rounded-2xl border flex items-start gap-3 text-sm font-medium transition-all duration-300';
      void fb.offsetWidth; 

      const iconContainer = document.getElementById(`feedback-icon-${taskId}`);
      const msgContainer = document.getElementById(`feedback-msg-${taskId}`);

      if (isCorrect) {
        fb.classList.add('text-emerald-400', 'bg-emerald-500/10', 'border-emerald-500/20', 'animate-pop');
        iconContainer.innerHTML = '';
        const icon = document.createElement('i');
        icon.setAttribute('data-lucide', 'check-circle-2');
        icon.className = 'w-5 h-5 shrink-0';
        iconContainer.appendChild(icon);
        msgContainer.textContent = msg;

        if (!progress[taskId]) {
          progress[taskId] = true;
          updateGlobalProgress();

          // Unhide task checkmark if in task list
          const taskCheckIcon = document.getElementById(`check-icon-${taskId}`);
          if (taskCheckIcon) {
            taskCheckIcon.classList.remove('hidden');
          }

          // Update course progress directly
          if (currentCourseId) {
            const course = COURSES.find(c => c.id === currentCourseId);
            if (course) {
              const solvedInCourse = course.tasks.filter(t => progress[t.id]).length;
              const total = course.tasks.length;
              const progressBar = document.getElementById(`course-progress-bar-${currentCourseId}`);
              const progressText = document.getElementById(`course-progress-text-${currentCourseId}`);

              if (progressBar) progressBar.style.width = `${(solvedInCourse/total)*100}%`;
              if (progressText) progressText.innerText = `${solvedInCourse}/${total}`;
            }
          }
        }
      } else {
        fb.classList.add('text-rose-400', 'bg-rose-500/10', 'border-rose-500/20', 'animate-shake');
        iconContainer.innerHTML = '';
        const icon = document.createElement('i');
        icon.setAttribute('data-lucide', 'alert-circle');
        icon.className = 'w-5 h-5 shrink-0';
        iconContainer.appendChild(icon);
        msgContainer.textContent = msg;
      }
      renderLucideIcons(iconContainer);
      setTimeout(() => { document.getElementById('task-content').scrollTo({ top: 9999, behavior: 'smooth' }); }, 50);
    }

        setup: (id) => {

              if (dir === 'up') return map.horizontals.some(w => w.x === x && w.y === y - 1);

                      const orParts = expr.split(' или ').map(orPart => {

                                  else if (str === 'слева свободно') result = !hasWall(r.x, r.y, 'left');
                                  else if (str === 'справа свободно') result = !hasWall(r.x, r.y, 'right');

                                  if (isNot) result = !result;

                                  andResult = andResult && result;
                                  if (!andResult) break;
                              }
                              if (andResult) return true;
                          }
                          return false;
                      };
                      conditionCache.set(condStr, evaluator);

                      let bgClass = painted.has(`${x},${y}`) ? 'bg-blue-500/40 ' : 'bg-black/20 ';
                      const newClassName = `active:scale-95 transition-all shadow-md aspect-square ${cell.dataset.baseclass} ${bgClass}`;

                      if (cell.className !== newClassName) {
                          cell.className = newClassName;

                      if (robot.x === x && robot.y === y) {

              }
          };

          window.reset_t15 = (tid) => { document.getElementById('t15-error').classList.add('hidden'); document.getElementById(`feedback-${tid}`).classList.add('hidden'); document.getElementById('t15-grid').innerHTML = ''; drawGrid({x: map.startX, y: map.startY}, new Set()); };
          window.reset_t15(id);
          document.getElementById('t15-code').oninput = () => { document.getElementById('t15-error').classList.add('hidden'); document.getElementById(`feedback-${id}`).classList.add('hidden'); };

          window.check_t15 = async (tid) => {
              const btn = document.getElementById('t15-run-btn'); const errEl = document.getElementById('t15-error');
              btn.disabled = true; btn.classList.add('opacity-50'); errEl.classList.add('hidden'); document.getElementById(`feedback-${tid}`).classList.add('hidden');
              
              const code = document.getElementById('t15-code').value;
              let lines = code.split('\n').map(l => l.trim().toLowerCase()).filter(l => l);
              let robot = { x: map.startX, y: map.startY, painted: new Set() };
              
              drawGrid(robot, robot.painted);

              try {
                  let i = 0, loopStack = [], iterations = 0, inIfSkip = false, ifDepth = 0;
                  while(i < lines.length) {
                      iterations++; if(iterations > 2000) throw new Error('Слишком много шагов! Возможно, бесконечный цикл.');
                      let cmd = lines[i];
                      if (cmd.includes('|')) cmd = cmd.split('|')[0].trim();
                      if (!cmd || cmd === 'использовать робот' || cmd.startsWith('алг') || cmd === 'нач' || cmd === 'кон') { i++; continue; }

                      if (inIfSkip) {
                          if (cmd.startsWith('если')) ifDepth++;
                          if (cmd === 'все') { ifDepth--; if (ifDepth === 0) inIfSkip = false; }
                          else if (cmd === 'иначе' && ifDepth === 1) inIfSkip = false; 
                          i++; continue;
                      }

                      if (cmd === 'вверх') { if(hasWall(robot.x, robot.y, 'up')) throw new Error('Робот разбился о стену сверху!'); robot.y--; }
                      else if (cmd === 'вниз') { if(hasWall(robot.x, robot.y, 'down')) throw new Error('Робот разбился о стену снизу!'); robot.y++; }
                      else if (cmd === 'влево') { if(hasWall(robot.x, robot.y, 'left')) throw new Error('Робот разбился о стену слева!'); robot.x--; }
                      else if (cmd === 'вправо') { if(hasWall(robot.x, robot.y, 'right')) throw new Error('Робот разбился о стену справа!'); robot.x++; }
                      else if (cmd === 'закрасить') { robot.painted.add(`${robot.x},${robot.y}`); }
                      else if (cmd.startsWith('если')) {
                          let cond = cmd.substring(4).replace(' то', '').trim();
                          if (!evaluateCondition(robot, cond)) { inIfSkip = true; ifDepth = 1; }
                      }
                      else if (cmd === 'иначе') { inIfSkip = true; ifDepth = 1; }
                      else if (cmd === 'все') { /* пустой блок */ }
                      else if (cmd.startsWith('нц пока')) {
                          let cond = cmd.substring(7).trim();
                          if (!evaluateCondition(robot, cond)) {
                              let depth = 1;
                              while(depth > 0 && i < lines.length - 1) {
                                  i++; let peekCmd = lines[i].split('|')[0].trim();
                                  if(peekCmd.startsWith('нц пока')) depth++; else if(peekCmd === 'кц') depth--;
                              }
                              if(depth > 0) throw new Error('Нет парного "кц" для "нц пока"');
                          } else loopStack.push({ start: i, cond: cond });
                      }
                      else if (cmd === 'кц') {
                          if(loopStack.length > 0) {
                              let loop = loopStack[loopStack.length - 1];
                              if(evaluateCondition(robot, loop.cond)) i = loop.start; else loopStack.pop();
                          } else throw new Error('Лишний "кц" без "нц пока"');
                      }
                      else throw new Error('Неизвестная команда: ' + cmd);

                      drawGrid(robot, robot.painted); 
                      // Оптимизация анимации
                      await new Promise(r => requestAnimationFrame(() => setTimeout(r, 60))); 
                      i++;
                  }

                  let success = true;
                  if(robot.painted.size !== map.targetPainted.length) success = false;
                  for(let p of map.targetPainted) { if(!robot.painted.has(p)) success = false; }

                  if (success) showFeedback(tid, true, "Идеально! Алгоритм успешно закрасил все нужные клетки.");
                  else showFeedback(tid, false, "Алгоритм завершился, но закрашены не те клетки (или пропущены нужные). Проходы закрашивать нельзя!");
              } catch(err) { errEl.innerText = err.message; errEl.classList.remove('hidden'); }
              btn.disabled = false; btn.classList.remove('opacity-50');
          };
        }
      },
