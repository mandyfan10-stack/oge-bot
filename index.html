<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ОГЭ Информатика - Решебник</title>
  
  <!-- Подключаем Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Подключаем иконки Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Интеграция с Telegram Web App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Настройка Tailwind (Анимации и цвета) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out',
            'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Убираем стандартные стили скроллбара для красоты */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    input[type="range"] { accent-color: #8b5cf6; }
  </style>
</head>
<body class="bg-slate-900 text-slate-50 font-sans overflow-hidden selection:bg-blue-500/30">

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div id="screen-home" class="absolute inset-0 transition-transform duration-500 ease-in-out translate-x-0">
    <div class="p-5 pb-24 h-full overflow-y-auto">
      <header class="mb-8 pt-4">
        <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
          ОГЭ Информатика
        </h1>
        <p class="text-slate-400 mt-2 text-sm">Интерактивный решебник-песочница</p>
        
        <div class="mt-6 flex items-center justify-between bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 backdrop-blur-sm">
          <div class="flex items-center gap-3">
            <div class="p-2 bg-yellow-500/20 rounded-xl text-yellow-400">
              <i data-lucide="trophy" class="w-6 h-6"></i>
            </div>
            <div>
              <div class="text-sm text-slate-400">Твой прогресс</div>
              <div class="font-bold text-lg"><span id="progress-count">0</span> / 15 решено</div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-2xl font-black text-blue-400"><span id="progress-percent">0</span>%</div>
          </div>
        </div>
      </header>

      <div class="space-y-4">
        <h2 class="text-xl font-bold mb-4 px-1">Доступные тренажеры</h2>
        <div id="tasks-list" class="space-y-4">
          <!-- Список заданий генерируется через JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- ЭКРАН ЗАДАНИЯ -->
  <div id="screen-task" class="absolute inset-0 bg-slate-900 transition-transform duration-500 ease-in-out translate-x-full z-10">
    <div class="h-full flex flex-col">
      <header class="flex items-center justify-between p-4 pt-6 bg-slate-800/50 border-b border-slate-700/50 backdrop-blur-md z-20">
        <button onclick="closeTask()" class="p-2 -ml-2 text-slate-400 hover:text-white transition-colors rounded-full hover:bg-slate-700 active:scale-95">
          <i data-lucide="chevron-left" class="w-7 h-7"></i>
        </button>
        <h2 id="task-title" class="font-bold text-lg">Задание</h2>
        <div class="w-10"></div> <!-- Placeholder для центрирования заголовка -->
      </header>
      
      <div id="task-content" class="flex-1 overflow-y-auto p-5 pb-24">
        <!-- Контент песочницы генерируется через JS -->
      </div>
    </div>
  </div>

  <script>
    // --- Данные ---
    const TASKS_DATA = [
      { id: 1, title: 'Задание 1', desc: 'Количественные параметры', icon: 'calculator', color: 'from-gray-600 to-slate-700' },
      { id: 2, title: 'Задание 2', desc: 'Кодирование информации', icon: 'book-open', color: 'from-emerald-500 to-green-600' },
      { id: 3, title: 'Задание 3', desc: 'Значение логического выражения', icon: 'brain-circuit', color: 'from-pink-500 to-rose-500' },
      { id: 4, title: 'Задание 4', desc: 'Кратчайший путь в графе', icon: 'network', color: 'from-blue-500 to-cyan-500' },
      { id: 5, title: 'Задание 5', desc: 'Анализ алгоритмов (Исполнители)', icon: 'route', color: 'from-amber-500 to-orange-500' },
      { id: 6, title: 'Задание 6', desc: 'Программы с условиями', icon: 'file-text', color: 'from-violet-500 to-purple-600' },
      { id: 7, title: 'Задание 7', desc: 'Адресация в Интернете', icon: 'link', color: 'from-sky-500 to-blue-600' },
      { id: 8, title: 'Задание 8', desc: 'Запросы (Множества)', icon: 'pie-chart', color: 'from-fuchsia-500 to-pink-600' },
      { id: 9, title: 'Задание 9', desc: 'Количество путей в графе', icon: 'network', color: 'from-teal-500 to-emerald-600' },
      { id: 10, title: 'Задание 10', desc: 'Системы счисления', icon: 'binary', color: 'from-purple-500 to-indigo-500' },
      { id: 11, title: 'Задание 11', desc: 'Поиск в тексте', icon: 'search', color: 'from-zinc-500 to-stone-600' },
      { id: 12, title: 'Задание 12', desc: 'Файловая система', icon: 'folder-search', color: 'from-yellow-500 to-amber-600' },
      { id: 13, title: 'Задание 13', desc: 'Презентация / Текст', icon: 'type', color: 'from-red-500 to-rose-600' },
      { id: 14, title: 'Задание 14', desc: 'Электронные таблицы', icon: 'file-spreadsheet', color: 'from-green-500 to-emerald-600' },
      { id: 15, title: 'Задание 15', desc: 'Программирование / Робот', icon: 'bot', color: 'from-blue-600 to-indigo-700' }
    ];

    let progress = {};
    for(let i=1; i<=15; i++) progress[i] = false;

    // --- Инициализация Telegram Web App ---
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.expand();
      const tgBg = window.Telegram.WebApp.backgroundColor;
      if(tgBg) document.body.style.backgroundColor = tgBg;
    }

    // --- Навигация и Рендер Главного экрана ---
    function renderHome() {
      const listContainer = document.getElementById('tasks-list');
      listContainer.innerHTML = TASKS_DATA.map(task => `
        <button onclick="openTask(${task.id})" class="w-full text-left p-4 rounded-3xl transition-all duration-300 transform active:scale-[0.98] relative overflow-hidden group border bg-slate-800/80 border-slate-700 hover:border-slate-600">
          <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b ${task.color}"></div>
          <div class="flex items-center justify-between ml-2">
            <div class="flex items-center gap-4">
              <div class="p-3 rounded-2xl bg-gradient-to-br ${task.color} bg-opacity-10 text-white shadow-inner">
                <i data-lucide="${task.icon}" class="w-6 h-6"></i>
              </div>
              <div>
                <h3 class="font-bold text-lg flex items-center gap-2">
                  ${task.title}
                  ${progress[task.id] ? '<i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>' : ''}
                </h3>
                <p class="text-slate-400 text-sm mt-0.5">${task.desc}</p>
              </div>
            </div>
            <div class="text-slate-500"><i data-lucide="arrow-right" class="w-5 h-5"></i></div>
          </div>
        </button>
      `).join('');
      
      updateProgressUI();
      lucide.createIcons();
    }

    function updateProgressUI() {
      const completedCount = Object.values(progress).filter(Boolean).length;
      document.getElementById('progress-count').innerText = completedCount;
      document.getElementById('progress-percent').innerText = Math.round((completedCount / 15) * 100);
    }

    function openTask(id) {
      const task = TASKS_DATA.find(t => t.id === id);
      document.getElementById('task-title').innerText = task.title;
      
      const content = document.getElementById('task-content');
      content.innerHTML = renderers[id].html();
      if(renderers[id].setup) renderers[id].setup();
      
      document.getElementById('screen-home').classList.replace('translate-x-0', '-translate-x-full');
      document.getElementById('screen-task').classList.replace('translate-x-full', 'translate-x-0');
      lucide.createIcons();
    }

    function closeTask() {
      document.getElementById('screen-home').classList.replace('-translate-x-full', 'translate-x-0');
      document.getElementById('screen-task').classList.replace('translate-x-0', 'translate-x-full');
      setTimeout(renderHome, 300); // Обновляем галочки после закрытия
    }

    function markCompleted(id, customMessage) {
      progress[id] = true;
      const successDiv = document.createElement('div');
      successDiv.className = 'mt-6 p-4 bg-green-500/10 border border-green-500/30 rounded-2xl text-green-400 flex items-start gap-3 animate-fade-in';
      successDiv.innerHTML = `
        <i data-lucide="check-circle" class="w-6 h-6 shrink-0 mt-0.5"></i>
        <div>
          <p class="font-bold">Абсолютно верно!</p>
          <p class="text-sm mt-1 text-green-300/80">${customMessage || 'Задание успешно выполнено.'}</p>
        </div>
      `;
      document.getElementById('task-content').appendChild(successDiv);
      lucide.createIcons();
      // Прокрутка вниз к сообщению
      document.getElementById('task-content').scrollTop = document.getElementById('task-content').scrollHeight;
    }

    // --- РЕНДЕРЕРЫ ЗАДАЧ (ПЕСОЧНИЦЫ) ---
    const renderers = {
      // ЗАДАНИЕ 1
      1: {
        html: () => `
          <div class="space-y-4 animate-fade-in">
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700">
              <h3 class="font-bold text-slate-200 mb-2">Объем информации</h3>
              <p class="text-sm text-slate-400">Каждый символ кодируется битами. Измерь объем текста в байтах.</p>
              
              <div class="mt-6 space-y-4">
                <div>
                  <label class="text-xs text-slate-500">Длина текста (символов): <span id="t1-chars-lbl">40</span></label>
                  <input type="range" id="t1-chars" min="10" max="100" step="10" value="40" class="w-full mt-1">
                </div>
                <div>
                  <label class="text-xs text-slate-500">Кодировка (бит на символ):</label>
                  <select id="t1-bits" class="w-full mt-1 p-3 bg-slate-900 rounded-xl text-white outline-none border border-slate-700 focus:border-blue-500">
                    <option value="8">8 бит (1 байт)</option>
                    <option value="16" selected>16 бит (2 байта - Unicode)</option>
                    <option value="32">32 бита (4 байта)</option>
                  </select>
                </div>
                
                <div class="p-4 bg-slate-900 rounded-xl flex justify-between items-center border border-slate-700">
                  <span class="text-slate-400">Итого:</span>
                  <span class="text-2xl font-bold text-blue-400"><span id="t1-res">80</span> байт</span>
                </div>
              </div>
            </div>
            <button onclick="markCompleted(1, 'Ты научился считать объем информации!')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 text-white rounded-2xl font-bold active:scale-95 transition-transform">Отметить решенным</button>
          </div>
        `,
        setup: () => {
          const update = () => {
            const chars = document.getElementById('t1-chars').value;
            const bits = document.getElementById('t1-bits').value;
            document.getElementById('t1-chars-lbl').innerText = chars;
            document.getElementById('t1-res').innerText = (chars * bits) / 8;
          };
          document.getElementById('t1-chars').oninput = update;
          document.getElementById('t1-bits').onchange = update;
        }
      },
      
      // ЗАДАНИЕ 2
      2: {
        html: () => `
          <div class="space-y-4 animate-fade-in text-center p-5 bg-slate-800 rounded-3xl border border-slate-700">
            <h3 class="font-bold text-emerald-400 mb-2">Декодирование</h3>
            <p class="text-sm text-slate-300">Расшифруй сообщение: <span class="font-mono text-white tracking-widest bg-slate-900 px-2 py-1 rounded">01101000</span></p>
            <div class="flex justify-center gap-2 mt-4 font-mono">
              <div class="p-2 border border-slate-600 rounded bg-slate-900">01 = А</div>
              <div class="p-2 border border-slate-600 rounded bg-slate-900">10 = Б</div>
              <div class="p-2 border border-slate-600 rounded bg-slate-900">00 = В</div>
            </div>
            <button onclick="markCompleted(2, 'Сообщение 01101000 = АББВ')" class="mt-6 w-full bg-emerald-600 py-3 rounded-2xl font-bold text-white active:scale-95 transition-transform">Я расшифровал!</button>
          </div>
        `
      },

      // ЗАДАНИЕ 3
      3: {
        html: () => `
          <div class="space-y-6 animate-fade-in">
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700">
              <h3 class="font-bold text-blue-400 mb-2">Условие задачи</h3>
              <p class="text-slate-300 leading-relaxed text-sm">Напишите <strong>наименьшее</strong> целое число <span class="font-mono text-pink-400">X</span>, для которого истинно высказывание:</p>
              <div class="mt-4 p-4 bg-slate-900 rounded-xl font-mono text-center border border-slate-700">
                (X > 16) <span class="text-blue-400">И НЕ</span> (X нечётное)
              </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700">
              <h3 class="font-bold text-purple-400 mb-4 flex items-center gap-2">
                <i data-lucide="calculator" class="w-5 h-5"></i> Песочница
              </h3>
              <div class="flex items-center gap-4 mb-6">
                <input type="range" id="t3-x" min="10" max="25" value="10" class="w-full">
                <div id="t3-val" class="text-2xl font-mono font-bold w-12 text-center text-white bg-slate-900 p-2 rounded-xl border border-slate-700">10</div>
              </div>
              <div class="space-y-3 font-mono text-sm">
                <div id="t3-cond1" class="flex justify-between p-3 rounded-xl border">
                  <span>(X > 16)</span><span id="t3-res1">ЛОЖЬ</span>
                </div>
                <div id="t3-cond2" class="flex justify-between p-3 rounded-xl border">
                  <span>НЕ (X нечётное)</span><span id="t3-res2">ИСТИНА</span>
                </div>
                <div id="t3-total" class="flex justify-between p-4 rounded-xl font-bold text-base bg-slate-900 text-slate-500">
                  <span>Итог (И)</span><span id="t3-resTotal">ЛОЖЬ</span>
                </div>
              </div>
            </div>

            <div class="flex gap-3" id="t3-input-area">
              <input type="number" id="t3-ans" placeholder="Ответ..." class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-white outline-none focus:border-blue-500 transition-colors">
              <button onclick="t3check()" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-2xl active:scale-95 transition-transform">Проверить</button>
            </div>
          </div>
        `,
        setup: () => {
          window.t3check = () => {
            if(document.getElementById('t3-ans').value == '18') {
              document.getElementById('t3-input-area').classList.add('hidden');
              markCompleted(3, '18 - наименьшее четное число больше 16!');
            } else alert("Неверно. Попробуй подвигать ползунок!");
          };

          document.getElementById('t3-x').oninput = (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('t3-val').innerText = val;
            
            const cond1 = val > 16;
            const cond2 = val % 2 === 0;
            const res = cond1 && cond2;

            const updateStyle = (id, isTrue) => {
              const el = document.getElementById(id);
              el.className = `flex justify-between p-3 rounded-xl border ${isTrue ? 'bg-green-500/20 text-green-300 border-green-500/30' : 'bg-red-500/20 text-red-300 border-red-500/30'}`;
              document.getElementById(id.replace('cond', 'res')).innerText = isTrue ? 'ИСТИНА' : 'ЛОЖЬ';
            };

            updateStyle('t3-cond1', cond1);
            updateStyle('t3-cond2', cond2);

            const totalEl = document.getElementById('t3-total');
            totalEl.className = `flex justify-between p-4 rounded-xl font-bold text-base transition-colors ${res ? 'bg-green-500 text-white shadow-lg shadow-green-500/30' : 'bg-slate-900 text-slate-500'}`;
            document.getElementById('t3-resTotal').innerText = res ? 'ИСТИНА' : 'ЛОЖЬ';
          };
          document.getElementById('t3-x').dispatchEvent(new Event('input')); // Init state
        }
      },

      // ЗАДАНИЕ 4
      4: {
        html: () => `
          <div class="space-y-6 animate-fade-in">
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700">
              <h3 class="font-bold text-blue-400 mb-2">Условие задачи</h3>
              <p class="text-slate-300 text-sm">Найдите длину <strong>кратчайшего пути</strong> из <strong>A</strong> в <strong>E</strong>.</p>
              <div class="mt-4 overflow-x-auto">
                <table class="w-full text-center text-sm border-collapse font-mono text-slate-300">
                  <tr class="text-slate-400 border-b border-slate-700"><th class="p-2"></th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th></tr>
                  <tr class="border-b border-slate-700/50"><td class="p-2 font-bold text-slate-400 border-r border-slate-700">A</td><td>-</td><td class="bg-slate-700/30 text-white">2</td><td class="bg-slate-700/30 text-white">5</td><td class="bg-slate-700/30 text-white">1</td><td>-</td></tr>
                  <tr class="border-b border-slate-700/50"><td class="p-2 font-bold text-slate-400 border-r border-slate-700">B</td><td class="bg-slate-700/30 text-white">2</td><td>-</td><td class="bg-slate-700/30 text-white">2</td><td>-</td><td>-</td></tr>
                  <tr class="border-b border-slate-700/50"><td class="p-2 font-bold text-slate-400 border-r border-slate-700">C</td><td class="bg-slate-700/30 text-white">5</td><td class="bg-slate-700/30 text-white">2</td><td>-</td><td class="bg-slate-700/30 text-white">3</td><td class="bg-slate-700/30 text-white">1</td></tr>
                  <tr class="border-b border-slate-700/50"><td class="p-2 font-bold text-slate-400 border-r border-slate-700">D</td><td class="bg-slate-700/30 text-white">1</td><td>-</td><td class="bg-slate-700/30 text-white">3</td><td>-</td><td class="bg-slate-700/30 text-white">6</td></tr>
                  <tr><td class="p-2 font-bold text-slate-400 border-r border-slate-700">E</td><td>-</td><td>-</td><td class="bg-slate-700/30 text-white">1</td><td class="bg-slate-700/30 text-white">6</td><td>-</td></tr>
                </table>
              </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700">
              <h3 class="font-bold text-cyan-400 mb-4">Построй маршрут</h3>
              <div class="flex flex-wrap gap-2 mb-6" id="t4-nodes"></div>
              
              <div class="bg-slate-900 p-4 rounded-2xl border border-slate-700 flex justify-between items-center">
                <div>
                  <div class="text-xs text-slate-500 mb-1">Маршрут</div>
                  <div id="t4-path-text" class="font-mono text-cyan-300 font-bold tracking-widest">A</div>
                </div>
                <div class="text-right">
                  <div class="text-xs text-slate-500 mb-1">Длина</div>
                  <div id="t4-len-text" class="text-2xl font-black text-white">0</div>
                </div>
              </div>
              
              <div class="mt-4 flex gap-3" id="t4-controls">
                <button onclick="window.t4reset()" class="px-4 py-2 bg-slate-700 rounded-xl text-sm text-white">Сброс</button>
                <button onclick="window.t4check()" id="t4-btn-ans" class="flex-1 py-2 rounded-xl text-sm font-bold bg-slate-800 text-slate-500 cursor-not-allowed">Ответить</button>
              </div>
            </div>
          </div>
        `,
        setup: () => {
          const graph = { A:{B:2,C:5,D:1}, B:{A:2,C:2}, C:{A:5,B:2,D:3,E:1}, D:{A:1,C:3,E:6}, E:{C:1,D:6} };
          let path = ['A'];
          
          window.t4reset = () => { path = ['A']; update(); };
          window.t4check = () => {
            let len = calculateLength();
            if (path[path.length-1] === 'E' && len === 5) {
              document.getElementById('t4-controls').classList.add('hidden');
              markCompleted(4, 'Путь A → D → C → E (1+3+1=5) самый быстрый!');
            } else alert("Ищи другой путь, этот не самый короткий!");
          };

          const calculateLength = () => {
            let len = 0;
            for (let i=0; i<path.length-1; i++) len += graph[path[i]][path[i+1]];
            return len;
          };

          const update = () => {
            document.getElementById('t4-path-text').innerText = path.join(' → ');
            document.getElementById('t4-len-text').innerText = calculateLength();
            
            const isComplete = path[path.length-1] === 'E';
            const btnAns = document.getElementById('t4-btn-ans');
            if(isComplete) {
              btnAns.className = "flex-1 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-md shadow-blue-500/20";
            } else {
              btnAns.className = "flex-1 py-2 rounded-xl text-sm font-bold bg-slate-800 text-slate-500 cursor-not-allowed";
            }

            const nodesContainer = document.getElementById('t4-nodes');
            nodesContainer.innerHTML = ['A','B','C','D','E'].map(node => {
              const isSelected = path.includes(node);
              const isLast = path[path.length - 1] === node;
              const lastNode = path[path.length - 1];
              const canMoveTo = !isSelected && graph[lastNode] && graph[lastNode][node] !== undefined;
              
              let style = 'bg-slate-900 text-slate-600 opacity-50 cursor-not-allowed';
              if(isLast) style = 'bg-cyan-500 text-white shadow-lg shadow-cyan-500/40 scale-110';

              else if(canMoveTo) style = 'bg-slate-700 text-white border border-slate-500 border-dashed animate-pulse';

              const clickHandler = (canMoveTo || isLast) ? `onclick="window.t4click('${node}')"` : '';
              return `<button ${clickHandler} class="w-12 h-12 rounded-2xl font-bold text-lg flex items-center justify-center transition-all ${style}">${node}</button>`;
            }).join('');
          };

          window.t4click = (node) => {
            if(path[path.length-1] === node && path.length > 1) path.pop();
            else path.push(node);
            update();
          };
          update();
        }
