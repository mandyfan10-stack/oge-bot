<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ОГЭ Информатика - Решебник</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent;}
    
    /* Анимации */
    .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .animate-pop { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .animate-shake { animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
    .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    .animate-message { animation: messagePop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards; transform-origin: bottom left; }
    .animate-message-user { animation: messagePop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards; transform-origin: bottom right; }
    .animate-spin-slow { animation: spin 3s linear infinite; }

    @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
    @keyframes messagePop { 0% { opacity: 0; transform: scale(0.8) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

    /* Премиум компоненты */
    .glass-panel { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
    .glass-button { background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
    .glass-button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
    .glass-button:active { transform: translateY(1px) scale(0.98); }

    #chat-modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
    #chat-modal.hidden-chat { opacity: 0; visibility: hidden; pointer-events: none; }
    #chat-container { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    #chat-modal.hidden-chat #chat-container { transform: translateY(100%); }
  </style>
</head>
<body>
  <!-- Окружающее свечение -->
  <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-600/10 blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-blue-600/10 blur-[120px]"></div>
  </div>

  <!-- ЭКРАН 1: КУРСЫ (МОДУЛИ) -->
  <div id="screen-courses" class="absolute inset-0 transition-transform duration-500 ease-in-out translate-x-0 overflow-y-auto p-5 pb-24 z-10">
    <header class="mb-8 pt-4 animate-slide-up">
      <h1 class="text-3xl font-bold tracking-tight flex items-center gap-3">
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 to-purple-400">ОГЭ Инфо</span>
        <i data-lucide="sparkles" class="text-purple-400 w-6 h-6 animate-pulse"></i>
      </h1>
      <p class="text-zinc-400 font-light mt-2 text-sm">Образовательные модули</p>
      
      <div class="mt-6 glass-panel p-5 rounded-[2rem] flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="p-3 bg-indigo-500/20 rounded-2xl text-indigo-300"><i data-lucide="award"></i></div>
          <div>
            <div class="text-xs text-zinc-400 uppercase tracking-wider font-semibold mb-1">Всего решено</div>
            <div class="font-medium text-lg"><span id="global-progress">0</span> <span class="text-zinc-500">/ 20</span></div>
          </div>
        </div>
      </div>
    </header>
    <div id="courses-list" class="space-y-5"></div>
  </div>

  <!-- ЭКРАН 2: СПИСОК ЗАДАЧ КУРСА -->
  <div id="screen-tasks" class="absolute inset-0 bg-[#09090b] transition-transform duration-500 ease-in-out translate-x-full overflow-y-auto p-5 pb-24 z-20">
    <header class="flex items-center gap-4 pt-4 mb-8">
      <button onclick="closeCourse()" class="p-2 -ml-2 glass-button rounded-xl text-zinc-400 hover:text-white"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
      <div>
        <h2 id="course-title" class="font-medium text-xl text-zinc-100">Название курса</h2>
        <p id="course-desc" class="text-sm text-zinc-500 font-light"></p>
      </div>
    </header>
    <div id="tasks-list" class="space-y-4"></div>
  </div>

  <!-- ЭКРАН 3: ПЕСОЧНИЦА ЗАДАЧИ -->
  <div id="screen-task" class="absolute inset-0 bg-[#09090b] transition-transform duration-500 ease-in-out translate-x-full flex flex-col z-30">
    <header class="flex items-center justify-between p-4 pt-6 glass-panel border-b-0 border-white/5 relative z-10">
      <div class="flex items-center gap-3">
        <button onclick="closeTask()" class="p-2 -ml-2 text-zinc-400 hover:text-white transition-colors rounded-full"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
        <h2 id="task-title" class="font-medium text-lg tracking-wide text-zinc-100">Задание</h2>
      </div>
      <button id="btn-regenerate" onclick="regenerateTask()" class="p-2 text-indigo-400 hover:text-indigo-300 transition-colors rounded-full" title="Сгенерировать новые условия"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
    </header>
    <div id="task-content" class="flex-1 overflow-y-auto p-5 pb-24 relative"></div>
  </div>

  <!-- КНОПКА AI -->
  <button onclick="toggleChat(true)" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full text-white shadow-[0_8px_30px_rgba(99,102,241,0.4)] z-40 flex items-center justify-center transition-transform hover:scale-105 active:scale-95 group">
    <i data-lucide="bot" class="w-6 h-6 group-hover:animate-bounce"></i>
  </button>

  <!-- МОДАЛКА AI -->
  <div id="chat-modal" class="hidden-chat fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex flex-col justify-end">
    <div class="absolute inset-0" onclick="toggleChat(false)"></div>
    <div id="chat-container" class="bg-[#09090b] border-t border-white/10 rounded-t-[2rem] w-full max-h-[85vh] flex flex-col relative z-10 shadow-2xl">
      <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mt-3 mb-2"></div>
      <header class="flex items-center justify-between p-4 px-6 border-b border-white/5">
        <div class="flex items-center gap-3 text-indigo-300 font-medium"><div class="p-2 bg-indigo-500/20 rounded-xl"><i data-lucide="sparkles" class="w-5 h-5"></i></div> ИИ-Наставник</div>
        <button onclick="toggleChat(false)" class="p-2 text-zinc-500 hover:text-white transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
      </header>
      <div id="chat-messages" class="flex-1 overflow-y-auto p-5 space-y-5 scroll-smooth">
        <div class="flex justify-start animate-message"><div class="max-w-[85%] p-4 rounded-2xl rounded-tl-none text-sm bg-white/5 border border-white/10 text-zinc-200 font-light leading-relaxed">Привет! Я ИИ-репетитор. Спрашивай любую задачу, если застрял! ✨</div></div>
      </div>
      <div class="p-4 px-5 glass-panel border-t-0">
        <div class="flex gap-2 bg-black/40 border border-white/10 p-1.5 rounded-2xl">
          <input type="text" id="chat-input" placeholder="Задай вопрос..." class="flex-1 bg-transparent px-4 py-2 outline-none text-white text-sm font-light" onkeypress="if(event.key === 'Enter') sendChatMessage()">
          <button onclick="sendChatMessage()" class="bg-indigo-600 p-3 rounded-xl text-white"><i data-lucide="send" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://oge-backend.onrender.com/api/chat";
    const TOTAL_TASKS = 20;

    // --- СТРУКТУРА КУРСОВ ---
    const COURSES = [
      {
        id: 'c1', title: 'Тренажер ОГЭ (Задания 1-15)', desc: 'Полный набор всех интерактивных заданий из ОГЭ.', 
        icon: 'layout-list', color: 'from-blue-500 to-indigo-600', delay: 0.1,
        tasks: [
          { id: 1, title: 'Задание 1', desc: 'Объем информации', icon: 'file-digit' },
          { id: 2, title: 'Задание 2', desc: 'Декодирование', icon: 'key' },
          { id: 3, title: 'Задание 3', desc: 'Логические выражения', icon: 'git-merge' },
          { id: 4, title: 'Задание 4', desc: 'Графы и маршруты', icon: 'route' },
          { id: 5, title: 'Задание 5', desc: 'Исполнители', icon: 'cpu' },
          { id: 6, title: 'Задание 6', desc: 'Условия (Python)', icon: 'terminal' },
          { id: 7, title: 'Задание 7', desc: 'Адресация URL', icon: 'globe' },
          { id: 8, title: 'Задание 8', desc: 'Множества', icon: 'layers' },
          { id: 9, title: 'Задание 9', desc: 'Количество путей', icon: 'git-branch' },
          { id: 10, title: 'Задание 10', desc: 'Системы счисления', icon: 'binary' },
          { id: 11, title: 'Задание 11', desc: 'Поиск в тексте', icon: 'search' },
          { id: 12, title: 'Задание 12', desc: 'Маски файлов', icon: 'folder-search' },
          { id: 13, title: 'Задание 13', desc: 'Форматирование', icon: 'type' },
          { id: 14, title: 'Задание 14', desc: 'Электронные таблицы', icon: 'table-2' },
          { id: 15, title: 'Задание 15', desc: 'Робот (Алгоритмы)', icon: 'bot' }
        ]
      },
      {
        id: 'c2', title: 'Основы Python', desc: 'Дополнительный курс: циклы, списки и функции.', 
        icon: 'terminal-square', color: 'from-emerald-400 to-teal-600', delay: 0.2,
        tasks: [
          { id: 16, title: 'Цикл FOR', desc: 'Предсказание вывода программы', icon: 'repeat' },
          { id: 17, title: 'Списки (Массивы)', desc: 'Индексация элементов', icon: 'list' },
          { id: 18, title: 'Функции', desc: 'Аргументы и возврат', icon: 'function-square' }
        ]
      },
      {
        id: 'c3', title: 'Компьютерные сети и ПК', desc: 'Основы железа, IP адреса и маски подсети.', 
        icon: 'server', color: 'from-sky-400 to-blue-600', delay: 0.3,
        tasks: [
          { id: 19, title: 'IP-адресация', desc: 'Сборка валидного IP-адреса', icon: 'network' },
          { id: 20, title: 'Устройство ПК', desc: 'Функции комплектующих', icon: 'cpu' }
        ]
      }
    ];

    let progress = {};
    let currentCourseId = null;
    let currentTaskId = null;
    window.taskState = {}; 

    if (window.Telegram?.WebApp) { window.Telegram.WebApp.expand(); }

    function renderCourses() {
      const list = document.getElementById('courses-list');
      list.innerHTML = COURSES.map(c => {
        const solvedInCourse = c.tasks.filter(t => progress[t.id]).length;
        const total = c.tasks.length;
        return `
        <button onclick="openCourse('${c.id}')" class="w-full text-left p-5 glass-panel rounded-[2rem] relative group animate-slide-up" style="animation-delay: ${c.delay}s;">
          <div class="absolute inset-0 bg-gradient-to-r ${c.color} opacity-0 group-hover:opacity-10 transition-opacity duration-300 rounded-[2rem]"></div>
          <div class="flex items-start gap-4 relative z-10">
            <div class="p-4 rounded-[1.25rem] bg-gradient-to-br ${c.color} bg-opacity-20 text-white shadow-lg">
              <i data-lucide="${c.icon}" class="w-6 h-6"></i>
            </div>
            <div class="flex-1">
              <h3 class="font-medium text-lg text-zinc-100">${c.title}</h3>
              <p class="text-zinc-500 font-light text-sm mt-1 mb-3">${c.desc}</p>
              <div class="flex items-center gap-2">
                <div class="flex-1 h-1.5 bg-black/40 rounded-full overflow-hidden border border-white/5">
                  <div class="h-full bg-gradient-to-r ${c.color} rounded-full transition-all duration-500" style="width: ${(solvedInCourse/total)*100}%"></div>
                </div>
                <span class="text-xs font-mono text-zinc-400">${solvedInCourse}/${total}</span>
              </div>
            </div>
          </div>
        </button>
      `}).join('');
      lucide.createIcons();
      updateGlobalProgress();
    }

    function openCourse(id) {
      currentCourseId = id;
      const course = COURSES.find(c => c.id === id);
      document.getElementById('course-title').innerText = course.title;
      document.getElementById('course-desc').innerText = course.desc;
      renderTasks(course);
      document.getElementById('screen-courses').classList.replace('translate-x-0', '-translate-x-full');
      document.getElementById('screen-tasks').classList.replace('translate-x-full', 'translate-x-0');
    }

    function closeCourse() {
      currentCourseId = null;
      renderCourses(); 
      document.getElementById('screen-courses').classList.replace('-translate-x-full', 'translate-x-0');
      document.getElementById('screen-tasks').classList.replace('translate-x-0', 'translate-x-full');
    }

    function renderTasks(course) {
      const list = document.getElementById('tasks-list');
      list.innerHTML = course.tasks.map((task, idx) => `
        <button onclick="openTask(${task.id})" class="w-full text-left p-4 glass-panel rounded-[1.5rem] flex items-center justify-between group animate-slide-up" style="animation-delay: ${idx * 0.05}s;">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-zinc-400 group-hover:text-white transition-colors">
              <i data-lucide="${task.icon}" class="w-5 h-5"></i>
            </div>
            <div>
              <h4 class="font-medium text-zinc-200 flex items-center gap-2">
                ${task.title}
                <i id="check-icon-${task.id}" data-lucide="check-circle-2" class="text-emerald-400 w-4 h-4 ${progress[task.id] ? '' : 'hidden'}"></i>
              </h4>
              <p class="text-xs text-zinc-500 font-light mt-0.5">${task.desc}</p>
            </div>
          </div>
          <i data-lucide="chevron-right" class="text-zinc-600 group-hover:text-zinc-300 transition-colors"></i>
        </button>
      `).join('');
      lucide.createIcons();
    }

    function regenerateTask() {
      if (!currentTaskId) return;
      const id = currentTaskId;
      const btn = document.getElementById('btn-regenerate');
      if (btn) {
        const icn = btn.querySelector('svg') || btn.querySelector('i');
        if (icn) {
          icn.classList.add('animate-spin-slow');
          setTimeout(() => icn.classList.remove('animate-spin-slow'), 500);
        }
      }
      if (renderers[id].init) renderers[id].init(id);
      const content = document.getElementById('task-content');
      content.innerHTML = renderers[id].html(id) + `<div id="feedback-${id}" class="hidden mt-6 p-4 rounded-2xl border flex items-center text-sm font-medium transition-all duration-300"></div>`;
      if (renderers[id].setup) renderers[id].setup(id);
      lucide.createIcons();
    }

    function openTask(id) {
      currentTaskId = id;
      const course = COURSES.find(c => c.id === currentCourseId);
      const taskInfo = course.tasks.find(t => t.id === id);
      document.getElementById('task-title').innerText = taskInfo.title;
      
      if (renderers[id].init) renderers[id].init(id);
      const content = document.getElementById('task-content');
      content.innerHTML = renderers[id].html(id) + `<div id="feedback-${id}" class="hidden mt-6 p-4 rounded-2xl border flex items-center text-sm font-medium transition-all duration-300"></div>`;
      if (renderers[id].setup) renderers[id].setup(id);
      
      document.getElementById('screen-tasks').classList.replace('translate-x-0', '-translate-x-full');
      document.getElementById('screen-task').classList.replace('translate-x-full', 'translate-x-0');
      lucide.createIcons();
    }

    function closeTask() {
      currentTaskId = null;
      document.getElementById('screen-tasks').classList.replace('-translate-x-full', 'translate-x-0');
      document.getElementById('screen-task').classList.replace('translate-x-0', 'translate-x-full');
      
      if (currentCourseId) renderTasks(COURSES.find(c => c.id === currentCourseId));
      setTimeout(() => { document.getElementById('task-content').innerHTML = ''; }, 500); 
    }

    function updateGlobalProgress() {
      const solved = Object.values(progress).filter(Boolean).length;
      document.getElementById('global-progress').innerText = solved;
    }

    function showFeedback(taskId, isCorrect, msg) {
      const fb = document.getElementById(`feedback-${taskId}`);
      if (!fb) return;
      fb.className = 'mt-6 p-4 rounded-2xl border flex items-start gap-3 text-sm font-medium transition-all duration-300';
      void fb.offsetWidth; 
      if (isCorrect) {
        fb.classList.add('text-emerald-400', 'bg-emerald-500/10', 'border-emerald-500/20', 'animate-pop');
        fb.innerHTML = `<i data-lucide="check-circle-2" class="w-5 h-5 shrink-0"></i><div>${msg}</div>`;
        progress[taskId] = true;
      } else {
        fb.classList.add('text-rose-400', 'bg-rose-500/10', 'border-rose-500/20', 'animate-shake');
        fb.innerHTML = `<i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i><div>${msg}</div>`;
      }
      lucide.createIcons();
      setTimeout(() => { document.getElementById('task-content').scrollTo({ top: 9999, behavior: 'smooth' }); }, 50);
    }

    // --- AI ЧАТ И ГЕНЕРАЦИЯ КАРТИНОК ---
    function toggleChat(show) { 
      const modal = document.getElementById('chat-modal');
      if (show) modal.classList.remove('hidden-chat');
      else modal.classList.add('hidden-chat');
    }

    async function sendChatMessage() {
      const inputEl = document.getElementById('chat-input');
      const text = inputEl.value.trim();
      if (!text) return;
      
      inputEl.value = '';
      const messagesDiv = document.getElementById('chat-messages');
      
      messagesDiv.innerHTML += `
        <div class="flex justify-end animate-message-user">
          <div class="max-w-[85%] p-4 rounded-2xl rounded-tr-none text-sm bg-indigo-600 text-white font-light shadow-lg">${text}</div>
        </div>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      const typingId = 'typing-' + Date.now();
      messagesDiv.innerHTML += `
        <div id="${typingId}" class="flex justify-start animate-message">
          <div class="p-4 rounded-2xl rounded-tl-none bg-white/5 border border-white/10 flex gap-1 items-center">
            <div class="w-1.5 h-1.5 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
            <div class="w-1.5 h-1.5 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
            <div class="w-1.5 h-1.5 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
          </div>
        </div>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      // Даем ИИ понять контекст текущего задания
      const optimizedPrompt = currentTaskId 
        ? `[Пользователь решает Задание ${currentTaskId}]. Вопрос: ${text}` 
        : text;

      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: optimizedPrompt })
        });
        const data = await response.json();
        document.getElementById(typingId).remove();
        
        // --- БЕСШОВНАЯ ГЕНЕРАЦИЯ КАРТИНОК (SVG) ИИ-НАСТАВНИКОМ ---
        let visualAddon = '';
        
        // Показываем картинку, если ученик находится в 4, 8 или 9 задании и задает любой вопрос 
        if (currentTaskId && [4, 8, 9].includes(currentTaskId)) {
          if (currentTaskId === 9) {
            visualAddon = `
            <div class="mt-4 p-4 bg-teal-950/40 border border-teal-500/30 rounded-xl">
              <div class="text-xs text-teal-300 font-medium mb-3 flex items-center gap-1"><i data-lucide="image" class="w-4 h-4"></i> Схема: Сложение путей</div>
              <svg viewBox="0 0 200 100" class="w-full h-auto mb-2 opacity-90 drop-shadow-md">
                <defs><marker id="arr-ai" markerWidth="6" markerHeight="4" refX="14" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#2dd4bf"/></marker></defs>
                <line x1="30" y1="50" x2="100" y2="20" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arr-ai)"/>
                <line x1="30" y1="50" x2="100" y2="80" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arr-ai)"/>
                <line x1="100" y1="20" x2="170" y2="50" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arr-ai)"/>
                <line x1="100" y1="80" x2="170" y2="50" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arr-ai)"/>
                <line x1="30" y1="50" x2="170" y2="50" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arr-ai)"/>
                <circle cx="30" cy="50" r="12" fill="#134e4a" stroke="#2dd4bf"/><text x="30" y="54" fill="white" font-size="11" text-anchor="middle" font-weight="bold">A</text>
                <circle cx="100" cy="20" r="12" fill="#134e4a" stroke="#2dd4bf"/><text x="100" y="24" fill="white" font-size="11" text-anchor="middle" font-weight="bold">B</text>
                <circle cx="100" cy="80" r="12" fill="#134e4a" stroke="#2dd4bf"/><text x="100" y="84" fill="white" font-size="11" text-anchor="middle" font-weight="bold">C</text>

          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>
              <h3 class="font-medium text-zinc-200 text-lg">Электронные таблицы</h3>
              <p class="text-sm text-zinc-400 font-light mt-1">Измени ячейки так, чтобы формула <b>=СУММ(A1:A2)</b> стала равна <b>${window.taskState[id].target}</b>.</p>
            </div>
            <div class="overflow-hidden rounded-2xl border border-white/10 bg-black/40 shadow-inner">
              <div class="grid grid-cols-2 text-center border-b border-white/5"><div class="p-3 text-xs text-zinc-600 border-r border-white/5">1</div><div class="p-1"><input type="number" id="t14-a1" value="10" class="w-full bg-transparent p-2 text-center text-white outline-none font-mono"></div></div>
              <div class="grid grid-cols-2 text-center border-b border-white/5"><div class="p-3 text-xs text-zinc-600 border-r border-white/5">2</div><div class="p-1"><input type="number" id="t14-a2" value="20" class="w-full bg-transparent p-2 text-center text-white outline-none font-mono"></div></div>
              <div class="grid grid-cols-2 text-center bg-white/5"><div class="p-3 text-xs text-zinc-500 border-r border-white/5">СУММ</div><div class="p-2 text-zinc-300 font-light text-2xl" id="t14-sum">?</div></div>
            </div>
            <button onclick="window.check_t14(${id})" class="w-full py-4 rounded-xl bg-green-600 text-white font-medium hover:bg-green-500 shadow-lg">Проверить формулу</button>
          </div>
        `,
        setup: (id) => {
          const reset = () => { document.getElementById('t14-sum').innerText = '?'; document.getElementById(`feedback-${id}`).classList.add('hidden'); };
          document.getElementById('t14-a1').oninput = reset; document.getElementById('t14-a2').oninput = reset;
          window.check_t14 = (tid) => {
            const sum = +document.getElementById('t14-a1').value + +document.getElementById('t14-a2').value;
            document.getElementById('t14-sum').innerText = sum;
            if (sum === window.taskState[tid].target) showFeedback(tid, true, "Таблица работает! Сумма сошлась.");
            else showFeedback(tid, false, `Текущая сумма — ${sum}, а нужно ${window.taskState[tid].target}.`);
          };
        }
      },
      15: {
        init: (id) => { 
          const targets = [{x:2,y:2, text:'правый нижний'}, {x:2,y:0, text:'правый верхний'}, {x:0,y:2, text:'левый нижний'}];
          window.taskState[id] = targets[Math.floor(Math.random()*targets.length)];
        },
        html: (id) => `
          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>
              <h3 class="font-medium text-zinc-200 text-lg">Робот</h3>
              <p class="text-sm text-zinc-400 font-light mt-1">Доведи робота 🤖 в <b>${window.taskState[id].text}</b> угол. Команды: вправо, влево, вверх, вниз.</p>
            </div>
            <div class="flex gap-4">
              <textarea id="t15-code" class="flex-1 bg-black/40 border border-white/10 rounded-2xl p-4 text-sm font-mono text-zinc-300 outline-none focus:border-blue-500/50 resize-none" placeholder="вправо\nвниз"></textarea>
              <div class="w-1/2 max-w-[150px] aspect-square grid grid-cols-3 gap-1 bg-white/5 p-1 rounded-2xl border border-white/10" id="t15-grid"></div>
            </div>
            <button id="t15-run-btn" onclick="window.check_t15(${id})" class="w-full mt-2 py-4 rounded-xl bg-blue-600 text-white font-medium shadow-lg"><span class="flex items-center justify-center gap-2"><i data-lucide="play" class="w-4 h-4"></i> Запустить скрипт</span></button>
          </div>
        `,
        setup: (id) => {
          const drawGrid = (rx,ry) => {
            let html = '';
            for(let y=0; y<3; y++){
              for(let x=0; x<3; x++){
                const isR = (x===rx && y===ry);
                const isTarget = (x===window.taskState[id].x && y===window.taskState[id].y);
                const bg = isR ? 'bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] transform scale-105' : (isTarget ? 'bg-white/10' : 'bg-black/40 border border-white/5');
                html += `<div class="aspect-square flex items-center justify-center rounded-xl transition-all ${bg}">${isR ? '🤖' : (isTarget ? '🎯' : '')}</div>`;
              }
            }
            document.getElementById('t15-grid').innerHTML = html;
          };
          drawGrid(0,0);
          
          document.getElementById('t15-code').oninput = () => { drawGrid(0,0); document.getElementById(`feedback-${id}`).classList.add('hidden'); };
          
          window.check_t15 = async (tid) => {
            const btn = document.getElementById('t15-run-btn');
            btn.disabled = true; btn.classList.add('opacity-50'); document.getElementById(`feedback-${tid}`).classList.add('hidden');
            
            const code = document.getElementById('t15-code').value.toLowerCase().split('\n');
            let x=0, y=0; drawGrid(0,0);
            
            for (let c of code) {
               if(c.trim()==='вправо' && x<2) x++;
               if(c.trim()==='влево' && x>0) x--;
               if(c.trim()==='вниз' && y<2) y++;
               if(c.trim()==='вверх' && y>0) y--;
               drawGrid(x,y);
               await new Promise(r => setTimeout(r, 400));
            }
            
            if(x === window.taskState[tid].x && y === window.taskState[tid].y) showFeedback(tid, true, "Отличный алгоритм! Робот на месте.");
            else showFeedback(tid, false, "Ошибка. Робот не достиг целевой клетки.");
            btn.disabled = false; btn.classList.remove('opacity-50');
          };
        }
      },
      // НОВЫЕ ЗАДАНИЯ КУРСА "PYTHON"
      16: {
        init: (id) => { window.taskState[id] = { limit: [5, 7, 9, 11][Math.floor(Math.random()*4)] }; },
        html: (id) => `
          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>
              <h3 class="font-medium text-zinc-200 text-lg">Цикл FOR</h3>
              <p class="text-sm text-zinc-400 font-light mt-1">Какое последнее число выведет эта программа?</p>
            </div>
            <div class="bg-[#0f111a] p-5 rounded-2xl border border-white/5 font-mono text-sm text-zinc-300">
              <span class="text-violet-400">for</span> i <span class="text-violet-400">in</span> <span class="text-blue-400">range</span>(1, <span class="text-orange-300">${window.taskState[id].limit}</span>):<br>
              &nbsp;&nbsp;&nbsp;&nbsp;print(i)
            </div>
            <div class="flex gap-4 items-center">
              <input type="number" id="t16-ans" placeholder="Ответ..." class="flex-1 bg-black/40 border border-white/10 p-4 rounded-xl text-white outline-none font-mono text-center">
            </div>
            <button onclick="window.check_t16(${id})" class="w-full py-4 rounded-xl bg-emerald-600 text-white font-medium hover:bg-emerald-500 shadow-lg">Проверить</button>
          </div>
        `,
        setup: (id) => {
          document.getElementById('t16-ans').oninput = () => document.getElementById(`feedback-${id}`).classList.add('hidden');
          window.check_t16 = (tid) => {
            const ans = +document.getElementById('t16-ans').value;
            const target = window.taskState[tid].limit - 1;
            if (ans === target) showFeedback(tid, true, "Верно! Цикл for в Python не включает верхнюю границу.");
            else showFeedback(tid, false, "Ошибка. Вспомни, до какого числа работает range().");
          };
        }
      },
      17: {
        init: (id) => { window.taskState[id] = { index: [0, 2, 4][Math.floor(Math.random()*3)] }; },
        html: (id) => {
          const arr = [10, 20, 30, 40, 50];
          return `
          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>
              <h3 class="font-medium text-zinc-200 text-lg">Списки (Индексы)</h3>
              <p class="text-sm text-zinc-400 font-light mt-1">Что выведет программа на экран?</p>
            </div>
            <div class="bg-[#0f111a] p-5 rounded-2xl border border-white/5 font-mono text-sm text-zinc-300">
              arr = [10, 20, 30, 40, 50]<br>
              print(arr[<span class="text-orange-300">${window.taskState[id].index}</span>])
            </div>
            <input type="number" id="t17-ans" placeholder="Вывод..." class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white outline-none font-mono text-center">
            <button onclick="window.check_t17(${id}, [10,20,30,40,50])" class="w-full py-4 rounded-xl bg-emerald-600 text-white font-medium hover:bg-emerald-500 shadow-lg">Проверить</button>
          </div>
        `},
        setup: (id) => {
          document.getElementById('t17-ans').oninput = () => document.getElementById(`feedback-${id}`).classList.add('hidden');
          window.check_t17 = (tid, arr) => {
            const ans = +document.getElementById('t17-ans').value;
            const target = arr[window.taskState[tid].index];
            if (ans === target) showFeedback(tid, true, "Правильно! Индексация начинается с нуля.");
            else showFeedback(tid, false, "Неверно. Не забывай про отсчет с 0.");
          };
        }
      },
      18: {
        init: (id) => { window.taskState[id] = { add: [3, 5, 10][Math.floor(Math.random()*3)] }; },
        html: (id) => `
          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>
              <h3 class="font-medium text-zinc-200 text-lg">Функции</h3>
              <p class="text-sm text-zinc-400 font-light mt-1">Посчитай, что вернет функция при вызове.</p>
            </div>
            <div class="bg-[#0f111a] p-5 rounded-2xl border border-white/5 font-mono text-sm text-zinc-300">
              <span class="text-violet-400">def</span> <span class="text-blue-400">calc</span>(x):<br>
              &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-violet-400">return</span> x * <span class="text-orange-300">2</span> + <span class="text-orange-300">${window.taskState[id].add}</span><br><br>
              print(calc(<span class="text-orange-300">4</span>))
            </div>
            <input type="number" id="t18-ans" placeholder="Результат..." class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white outline-none font-mono text-center">
            <button onclick="window.check_t18(${id})" class="w-full py-4 rounded-xl bg-emerald-600 text-white font-medium hover:bg-emerald-500 shadow-lg">Проверить</button>
          </div>
        `,
        setup: (id) => {
          document.getElementById('t18-ans').oninput = () => document.getElementById(`feedback-${id}`).classList.add('hidden');
          window.check_t18 = (tid) => {
            const ans = +document.getElementById('t18-ans').value;
            const target = 4 * 2 + window.taskState[tid].add;
            if (ans === target) showFeedback(tid, true, "Отлично! Функция отработала как надо.");
            else showFeedback(tid, false, "Ошибка вычисления.");
          };
        }
      },
      // НОВЫЕ ЗАДАНИЯ КУРСА "СЕТИ И ПК"
      19: {
        init: (id) => { 
          const ips = [['192', '168', '1', '15'], ['10', '0', '0', '255']];
          window.taskState[id] = { parts: ips[Math.floor(Math.random()*ips.length)] }; 
        },
        html: (id) => {
          const p = window.taskState[id].parts;
          const pieces = [p[0]+'.', p[1], '.'+p[2]+'.', p[3]].sort(()=>Math.random()-0.5);
          return `
          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>
              <h3 class="font-medium text-zinc-200 text-lg">IP-адресация</h3>
              <p class="text-sm text-zinc-400 font-light mt-1">Собери валидный IP-адрес: <span class="text-white font-mono text-xs">${p.join('.')}</span></p>
            </div>
            <div id="t19-res" class="min-h-[56px] bg-black/40 border border-white/10 p-4 rounded-2xl font-mono text-sky-300 flex items-center shadow-inner"></div>
            <div class="flex flex-wrap gap-2.5">
              ${pieces.map(b => `<button onclick="window.t19_add('${b}')" class="glass-button px-4 py-2.5 rounded-xl text-zinc-300 font-mono text-sm">${b}</button>`).join('')}
              <button onclick="window.t19_clear()" class="px-4 py-2.5 rounded-xl bg-rose-500/10 text-rose-400 ml-auto"><i data-lucide="trash" class="w-4 h-4"></i></button>
            </div>
            <button onclick="window.check_t19(${id})" class="w-full py-4 rounded-xl bg-sky-600 text-white font-medium shadow-lg">Проверить IP</button>
          </div>
        `},
        setup: (id) => {
          window.t19ip = [];
          window.t19_add = (p) => { window.t19ip.push(p); document.getElementById('t19-res').innerText = window.t19ip.join(''); document.getElementById(`feedback-${id}`).classList.add('hidden'); };
          window.t19_clear = () => { window.t19ip = []; document.getElementById('t19-res').innerText = ''; document.getElementById(`feedback-${id}`).classList.add('hidden'); };
          window.check_t19 = (tid) => {
            const target = window.taskState[tid].parts.join('.');
            if (window.t19ip.join('') === target) showFeedback(tid, true, "IP-адрес собран верно!");
            else showFeedback(tid, false, "Ошибка сборки адреса.");
          };
        }
      },
      20: {
        init: (id) => { 
          const qs = [
            {q: 'Долговременное хранение файлов', a: 'HDD/SSD'},
            {q: 'Временное хранение запущенных программ', a: 'ОЗУ'},
            {q: 'Мозг компьютера (вычисления)', a: 'Процессор'}
          ];
          window.taskState[id] = qs[Math.floor(Math.random()*qs.length)]; 
        },
        html: (id) => `
          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>
              <h3 class="font-medium text-zinc-200 text-lg">Устройство ПК</h3>
              <p class="text-sm text-zinc-400 font-light mt-1">Какое устройство отвечает за: <br><b class="text-white">${window.taskState[id].q}</b>?</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
              ${['HDD/SSD', 'ОЗУ', 'Процессор', 'Видеокарта'].sort(()=>Math.random()-0.5).map(v => 
                `<button onclick="window.t20_sel('${v}')" id="t20-btn-${v}" class="t20-btns glass-button p-4 rounded-xl text-sm text-zinc-300">${v}</button>`
              ).join('')}
            </div>
            <button onclick="window.check_t20(${id})" class="w-full py-4 rounded-xl bg-sky-600 text-white font-medium shadow-lg">Ответить</button>
          </div>
        `,
        setup: (id) => {
          window.t20ans = '';
          window.t20_sel = (v) => {
            window.t20ans = v;
            document.querySelectorAll('.t20-btns').forEach(b => b.classList.replace('border-sky-500', 'border-white/10'));
            document.getElementById('t20-btn-'+v).classList.replace('border-white/10', 'border-sky-500');
            document.getElementById(`feedback-${id}`).classList.add('hidden');
          };
          window.check_t20 = (tid) => {
            if (window.t20ans === window.taskState[tid].a) showFeedback(tid, true, "Совершенно верно!");
            else showFeedback(tid, false, "Неверно. Подумай еще.");
          };
        }
      }
    };

    renderCourses(); 
  </script>
