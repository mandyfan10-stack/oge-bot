<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ОГЭ Информатика - Решебник</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent;}
    
    /* Анимации */
    .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .animate-pop { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .animate-shake { animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
    .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    .animate-message { animation: messagePop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards; transform-origin: bottom left; }
    .animate-message-user { animation: messagePop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards; transform-origin: bottom right; }

    @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
    @keyframes messagePop { 0% { opacity: 0; transform: scale(0.8) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

    /* Премиум компоненты */
    .glass-panel { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
    .glass-button { background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
    .glass-button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
    .glass-button:active { transform: translateY(1px) scale(0.98); }

    #chat-modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
    #chat-modal.hidden-chat { opacity: 0; visibility: hidden; pointer-events: none; }
    #chat-container { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    #chat-modal.hidden-chat #chat-container { transform: translateY(100%); }
  </style>
</head>
<body>
  <!-- Окружающее свечение -->
  <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-600/10 blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-blue-600/10 blur-[120px]"></div>
  </div>

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div id="screen-home" class="absolute inset-0 transition-transform duration-500 ease-in-out translate-x-0 overflow-y-auto p-5 pb-24">
    <header class="mb-8 pt-4 animate-slide-up">
      <h1 class="text-3xl font-bold tracking-tight flex items-center gap-3">
        <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 to-purple-400">ОГЭ Инфо</span>
        <i data-lucide="sparkles" class="text-purple-400 w-6 h-6 animate-pulse"></i>
      </h1>
      <p class="text-zinc-400 font-light mt-2 text-sm">Интерактивный курс и песочницы</p>
      
      <div class="mt-6 glass-panel p-5 rounded-[2rem] flex items-center justify-between relative overflow-hidden group">
        <div class="flex items-center gap-4 relative z-10">
          <div class="p-3 bg-indigo-500/20 rounded-2xl text-indigo-300 shadow-[0_0_15px_rgba(99,102,241,0.2)]"><i data-lucide="award"></i></div>
          <div>
            <div class="text-xs text-zinc-400 uppercase tracking-wider font-semibold mb-1">Прогресс курса</div>
            <div class="font-medium text-lg"><span id="progress-count" class="text-white">0</span> <span class="text-zinc-500">/ 15</span></div>
          </div>
        </div>
        <div class="text-3xl font-light text-indigo-300 relative z-10"><span id="progress-percent">0</span>%</div>
      </div>
    </header>
    <div id="tasks-list" class="space-y-4"></div>
  </div>

  <!-- ЭКРАН ЗАДАЧИ -->
  <div id="screen-task" class="absolute inset-0 bg-[#09090b] transition-transform duration-500 ease-in-out translate-x-full z-10 flex flex-col">
    <header class="flex items-center justify-between p-4 pt-6 glass-panel z-20 border-b-0 border-white/5 relative">
      <button onclick="closeTask()" class="p-2 -ml-2 text-zinc-400 hover:text-white transition-colors rounded-full"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
      <h2 id="task-title" class="font-medium text-lg tracking-wide text-zinc-100">Задание</h2>
      <div class="w-10"></div>
    </header>
    <div id="task-content" class="flex-1 overflow-y-auto p-5 pb-24 relative z-10"></div>
  </div>

  <!-- КНОПКА AI -->
  <button onclick="toggleChat(true)" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full text-white shadow-[0_8px_30px_rgba(99,102,241,0.4)] z-30 flex items-center justify-center transition-transform hover:scale-105 active:scale-95 group">
    <i data-lucide="sparkles" class="w-6 h-6 group-hover:animate-spin"></i>
  </button>

  <!-- МОДАЛКА AI -->
  <div id="chat-modal" class="hidden-chat fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex flex-col justify-end">
    <div class="absolute inset-0" onclick="toggleChat(false)"></div>
    <div id="chat-container" class="bg-[#09090b] border-t border-white/10 rounded-t-[2rem] w-full max-h-[85vh] flex flex-col relative z-10 shadow-2xl">
      <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mt-3 mb-2"></div>
      <header class="flex items-center justify-between p-4 px-6 border-b border-white/5">
        <div class="flex items-center gap-3 text-indigo-300 font-medium"><div class="p-2 bg-indigo-500/20 rounded-xl"><i data-lucide="bot" class="w-5 h-5"></i></div> ИИ-Наставник</div>
        <button onclick="toggleChat(false)" class="p-2 text-zinc-500 hover:text-white transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
      </header>
      <div id="chat-messages" class="flex-1 overflow-y-auto p-5 space-y-5 scroll-smooth">
        <div class="flex justify-start animate-message"><div class="max-w-[85%] p-4 rounded-2xl rounded-tl-none text-sm bg-white/5 border border-white/10 text-zinc-200 font-light leading-relaxed">Привет! Я ИИ-репетитор. Спрашивай любую задачу! ✨</div></div>
      </div>
      <div class="p-4 px-5 glass-panel border-t-0">
        <div class="flex gap-2 bg-black/40 border border-white/10 p-1.5 rounded-2xl">
          <input type="text" id="chat-input" placeholder="Задай вопрос..." class="flex-1 bg-transparent px-4 py-2 outline-none text-white text-sm font-light" onkeypress="if(event.key === 'Enter') sendChatMessage()">
          <button onclick="sendChatMessage()" class="bg-indigo-600 p-3 rounded-xl text-white"><i data-lucide="send" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // НАСТРОЙКИ СЕРВЕРА
    // ==========================================
    const BACKEND_URL = "https://oge_backend.onrender.com/api/chat";

    const TASKS = [
      { id: 1, title: 'Задание 1', desc: 'Объем информации', icon: 'hard-drive', color: 'from-zinc-500 to-zinc-700', delay: 0.1 },
      { id: 2, title: 'Задание 2', desc: 'Декодирование', icon: 'key', color: 'from-emerald-400 to-teal-600', delay: 0.15 },
      { id: 3, title: 'Задание 3', desc: 'Логические выражения', icon: 'git-merge', color: 'from-pink-400 to-rose-600', delay: 0.2 },
      { id: 4, title: 'Задание 4', desc: 'Графы и маршруты', icon: 'route', color: 'from-blue-400 to-indigo-600', delay: 0.25 },
      { id: 5, title: 'Задание 5', desc: 'Исполнители', icon: 'cpu', color: 'from-amber-400 to-orange-600', delay: 0.3 },
      { id: 6, title: 'Задание 6', desc: 'Условия (Python)', icon: 'terminal', color: 'from-violet-400 to-purple-600', delay: 0.35 },
      { id: 7, title: 'Задание 7', desc: 'Адресация URL', icon: 'globe', color: 'from-sky-400 to-blue-600', delay: 0.4 },
      { id: 8, title: 'Задание 8', desc: 'Множества', icon: 'layers', color: 'from-fuchsia-400 to-pink-600', delay: 0.45 },
      { id: 9, title: 'Задание 9', desc: 'Количество путей', icon: 'git-branch', color: 'from-teal-400 to-emerald-600', delay: 0.5 },
      { id: 10, title: 'Задание 10', desc: 'Системы счисления', icon: 'binary', color: 'from-indigo-400 to-purple-600', delay: 0.55 },
      { id: 11, title: 'Задание 11', desc: 'Поиск в тексте', icon: 'search', color: 'from-stone-400 to-stone-600', delay: 0.6 },
      { id: 12, title: 'Задание 12', desc: 'Маски файлов', icon: 'folder-search', color: 'from-yellow-400 to-amber-600', delay: 0.65 },
      { id: 13, title: 'Задание 13', desc: 'Форматирование', icon: 'type', color: 'from-red-400 to-rose-600', delay: 0.7 },
      { id: 14, title: 'Задание 14', desc: 'Электронные таблицы', icon: 'table-2', color: 'from-green-400 to-emerald-600', delay: 0.75 },
      { id: 15, title: 'Задание 15', desc: 'Робот (Алгоритмы)', icon: 'bot', color: 'from-blue-500 to-indigo-700', delay: 0.8 }
    ];

    let progress = {};

    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.expand();
      const tgBg = window.Telegram.WebApp.backgroundColor;
      if (tgBg) document.body.style.backgroundColor = tgBg; 
    }

    function renderHome() {
      const list = document.getElementById('tasks-list');
      list.innerHTML = TASKS.map(task => `
        <button onclick="openTask(${task.id})" class="w-full text-left p-4 glass-panel rounded-[1.5rem] relative group animate-slide-up" style="animation-delay: ${task.delay}s;">
          <div class="absolute inset-0 bg-gradient-to-r ${task.color} opacity-0 group-hover:opacity-5 transition-opacity duration-300 rounded-[1.5rem]"></div>
          <div class="flex items-center justify-between ml-1">
            <div class="flex items-center gap-4">
              <div class="p-3 rounded-2xl bg-gradient-to-br ${task.color} bg-opacity-10 text-white shadow-inner relative overflow-hidden">
                <div class="absolute inset-0 bg-black/20"></div>
                <i data-lucide="${task.icon}" class="w-5 h-5 relative z-10"></i>
              </div>
              <div>
                <h3 class="font-medium text-[1.05rem] flex items-center gap-2 text-zinc-200">
                  ${task.title} 
                  <i id="check-icon-${task.id}" data-lucide="check-circle-2" class="text-emerald-400 w-4 h-4 ${progress[task.id] ? '' : 'hidden'}"></i>
                </h3>
                <p class="text-zinc-500 font-light text-sm mt-0.5">${task.desc}</p>
              </div>
            </div>
            <div class="w-8 h-8 rounded-full border border-white/5 flex items-center justify-center group-hover:border-white/20 transition-colors">
              <i data-lucide="chevron-right" class="text-zinc-500 w-4 h-4 group-hover:text-white transition-colors"></i>
            </div>
          </div>
        </button>
      `).join('');
      lucide.createIcons();
      updateProgressUI();
    }

    function updateProgressUI() {
      const solved = Object.values(progress).filter(Boolean).length;
      document.getElementById('progress-count').innerText = solved;
      document.getElementById('progress-percent').innerText = Math.round((solved / 15) * 100);
      TASKS.forEach(t => {
        const icon = document.getElementById(`check-icon-${t.id}`);
        if (icon) {
          if (progress[t.id]) icon.classList.remove('hidden');
          else icon.classList.add('hidden');
        }
      });
    }

    function openTask(id) {
      const task = TASKS.find(t => t.id === id);
      document.getElementById('task-title').innerText = task.title;
      const content = document.getElementById('task-content');
      content.innerHTML = renderers[id].html(id) + `<div id="feedback-${id}" class="hidden mt-6 p-4 rounded-2xl border flex items-center text-sm font-medium transition-all duration-300"></div>`;
      if (renderers[id].setup) renderers[id].setup(id);
      
      document.getElementById('screen-home').classList.replace('translate-x-0', '-translate-x-full');
      document.getElementById('screen-task').classList.replace('translate-x-full', 'translate-x-0');
      lucide.createIcons();
    }

    function closeTask() {
      // Плавный отъезд
      document.getElementById('screen-home').classList.replace('-translate-x-full', 'translate-x-0');
      document.getElementById('screen-task').classList.replace('translate-x-0', 'translate-x-full');
      updateProgressUI();
      // Очистка контента ТОЛЬКО после завершения анимации (500ms)
      setTimeout(() => { document.getElementById('task-content').innerHTML = ''; }, 500); 
    }

    function showFeedback(taskId, isCorrect, msg) {
      const fb = document.getElementById(`feedback-${taskId}`);
      if (!fb) return;
      fb.className = 'mt-6 p-4 rounded-2xl border flex items-start gap-3 text-sm font-medium transition-all duration-300';
      void fb.offsetWidth; 
      if (isCorrect) {
        fb.classList.add('text-emerald-400', 'bg-emerald-500/10', 'border-emerald-500/20', 'animate-pop');
        fb.innerHTML = `<i data-lucide="check-circle-2" class="w-5 h-5 shrink-0"></i><div>${msg}</div>`;
        progress[taskId] = true;
      } else {
        fb.classList.add('text-rose-400', 'bg-rose-500/10', 'border-rose-500/20', 'animate-shake');
        fb.innerHTML = `<i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i><div>${msg}</div>`;
      }
      lucide.createIcons();
      setTimeout(() => {
        const container = document.getElementById('task-content');
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
      }, 50);
    }

    // --- AI ЧАТ С БЭКЕНДОМ ---
    function toggleChat(show) { 
      const modal = document.getElementById('chat-modal');
      if (show) modal.classList.remove('hidden-chat');
      else modal.classList.add('hidden-chat');
    }

    async function sendChatMessage() {
      const inputEl = document.getElementById('chat-input');
      const text = inputEl.value.trim();
      if (!text) return;
      
      inputEl.value = '';
      const messagesDiv = document.getElementById('chat-messages');
      
      messagesDiv.innerHTML += `
        <div class="flex justify-end animate-message-user">
          <div class="max-w-[85%] p-4 rounded-2xl rounded-tr-none text-sm bg-indigo-600 text-white font-light shadow-lg shadow-indigo-600/20">${text}</div>
        </div>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      const typingId = 'typing-' + Date.now();
      messagesDiv.innerHTML += `
        <div id="${typingId}" class="flex justify-start animate-message">
          <div class="p-4 rounded-2xl rounded-tl-none bg-white/5 border border-white/10 flex gap-1 items-center">
            <div class="w-1.5 h-1.5 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
            <div class="w-1.5 h-1.5 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
            <div class="w-1.5 h-1.5 bg-zinc-500 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
          </div>
        </div>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text })
        });
        const data = await response.json();
        document.getElementById(typingId).remove();
        
        const aiText = data.reply || 'Произошла ошибка обработки на сервере.';
        messagesDiv.innerHTML += `
          <div class="flex justify-start animate-message">
            <div class="max-w-[85%] p-4 rounded-2xl rounded-tl-none text-sm bg-white/5 border border-white/10 text-zinc-200 font-light leading-relaxed">
              ${aiText.replace(/\n/g, '<br>')}
            </div>
          </div>`;
      } catch (err) {
        document.getElementById(typingId).remove();
        messagesDiv.innerHTML += `
          <div class="flex justify-start animate-message">
            <div class="max-w-[85%] p-4 rounded-2xl rounded-tl-none text-sm bg-rose-500/10 border border-rose-500/20 text-rose-300 font-light">
              Сервер недоступен. Проверь работу бэкенда на Render.
            </div>
          </div>`;
      }
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ==========================================
    // ПЕСОЧНИЦЫ (Все 15 штук, логика без автопроверки)
    // ==========================================
    const renderers = {
      1: {
        html: (id) => `
          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>
              <h3 class="font-medium text-zinc-200 text-lg">Объем информации</h3>
              <p class="text-sm text-zinc-500 font-light mt-1">Установи ползунки так, чтобы объем документа составил ровно <b>80 байт</b>.</p>
            </div>
            <div class="space-y-5">
              <div>
                <div class="flex justify-between text-xs font-medium text-zinc-400 mb-3">
                  <span>Символов в тексте</span>
                  <span id="t1-chars-v" class="text-indigo-400">40</span>
                </div>
                <input type="range" id="t1-chars" min="10" max="100" step="10" value="40" class="w-full accent-indigo-500 h-1.5 bg-white/10 rounded-full appearance-none outline-none">
              </div>
              <div>
                <label class="text-xs font-medium text-zinc-400 mb-2 block">Кодировка (вес символа)</label>
                <div class="relative">
                  <select id="t1-bits" class="w-full bg-black/40 border border-white/10 p-3.5 rounded-xl outline-none text-white text-sm font-light appearance-none">
                    <option value="8">8 бит (1 байт)</option>
                    <option value="16" selected>16 бит (2 байта)</option>
                  </select>
                  <i data-lucide="chevron-down" class="absolute right-4 top-4 w-4 h-4 text-zinc-500 pointer-events-none"></i>
                </div>
              </div>
            </div>
            <div class="p-5 bg-black/40 rounded-2xl border border-white/5 flex justify-between items-center">
              <span class="text-zinc-500 font-light text-sm">Итоговый объем:</span>
              <span class="text-2xl font-light text-white tracking-wide"><span id="t1-res">?</span> <span class="text-sm text-zinc-500">байт</span></span>
            </div>
            <button onclick="window.check_t1(${id})" class="w-full py-4 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-500 transition-colors shadow-[0_4px_20px_rgba(79,70,229,0.3)]">Проверить расчет</button>
          </div>
        `,
        setup: (id) => {
          const update = () => {
            document.getElementById('t1-chars-v').innerText = document.getElementById('t1-chars').value;
            document.getElementById('t1-res').innerText = '?'; 
            document.getElementById(`feedback-${id}`).classList.add('hidden'); 
          };
          document.getElementById('t1-chars').oninput = update;
          document.getElementById('t1-bits').onchange = update;
          window.check_t1 = (tid) => {
            const res = (+document.getElementById('t1-chars').value * +document.getElementById('t1-bits').value) / 8;
            document.getElementById('t1-res').innerText = res;
            if (res === 80) showFeedback(tid, true, "Блестяще! 80 символов по 8 бит = 80 байт.");
            else showFeedback(tid, false, `Получилось ${res} байт. Нам нужно ровно 80. Измени параметры.`);
          };
        }
      },
      2: {
        html: (id) => `
          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>
              <h3 class="font-medium text-zinc-200 text-lg">Шифровальщик</h3>
              <p class="text-sm text-zinc-500 font-light mt-1">Расшифруй бинарное сообщение, используя кодовую таблицу.</p>
            </div>
            <div class="p-4 bg-emerald-950/30 border border-emerald-900/50 rounded-2xl text-center">
              <span class="font-mono text-emerald-400 tracking-[0.3em] text-lg">01101000</span>
            </div>
            <div class="grid grid-cols-3 gap-3 font-mono text-sm text-center">
              <div class="p-3 bg-black/40 border border-white/5 rounded-xl text-zinc-400">01 <span class="text-white ml-2">А</span></div>
              <div class="p-3 bg-black/40 border border-white/5 rounded-xl text-zinc-400">10 <span class="text-white ml-2">Б</span></div>
              <div class="p-3 bg-black/40 border border-white/5 rounded-xl text-zinc-400">00 <span class="text-white ml-2">В</span></div>
            </div>
            <div>
              <input type="text" id="t2-ans" placeholder="Введите расшифровку..." class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-emerald-500/50 uppercase font-medium text-center tracking-widest transition-colors">
            </div>
            <button onclick="window.check_t2(${id})" class="w-full py-4 rounded-xl bg-emerald-600 text-white font-medium hover:bg-emerald-500 transition-colors shadow-[0_4px_20px_rgba(5,150,105,0.3)]">Проверить расшифровку</button>
          </div>
        `,
        setup: (id) => {
          document.getElementById('t2-ans').oninput = () => document.getElementById(`feedback-${id}`).classList.add('hidden');
          window.check_t2 = (tid) => {
            const val = document.getElementById('t2-ans').value.toUpperCase().trim();
            if (val === 'АББВ') showFeedback(tid, true, "Верно! 01(А) 10(Б) 10(Б) 00(В).");
            else showFeedback(tid, false, "Ошибка дешифровки. Проверь код посимвольно.");
          };
        }
      },
      3: {
        html: (id) => `
          <div class="glass-panel p-6 rounded-[2rem] space-y-6 animate-fade">
            <div>

                html += `<div class="aspect-square flex items-center justify-center rounded-xl transition-all ${isR ? 'bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] transform scale-105' : 'bg-black/40 border border-white/5'}">${isR ? '🤖' : ''}</div>`;

             document.getElementById(`feedback-${id}`).classList.add('hidden');
